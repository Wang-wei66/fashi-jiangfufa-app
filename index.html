么过失？", "opts": ["执着万法实有", "堕断灭见——拨无因果，以为「一切皆空」就不用修行了", "增长我慢", "退失菩提心"], "correct": 1, "explain": "执空则堕断灭——以为「一切皆空」就否定因果、否定修行。中道不偏空有。"}, {"q": "对比手法「辨别学习」的理论依据是？", "opts": ["对比能节省时间", "人靠「差异」理解事物——不比不知「净」，不比不知「染」", "对比能增加信息量", "对比符合逻辑学原理"], "correct": 1, "explain": "辨别学习——人靠「差异」理解事物。不比不知「净」，不比不知「染」。"}, {"q": "对比手法的操作步骤第三步「归到」有哪两种方向？", "opts": ["肯定或否定", "「舍此取彼」或「圆融无碍」", "赞同或反对", "总结或提问"], "correct": 1, "explain": "有时对比后须取舍（舍轮回取涅槃），有时须超越对立（权实不二、色空不二）。"}, {"q": "「色即是空，空即是色」体现的是什么？", "opts": ["色和空是两个东西", "色等于空，空等于色", "二谛中道——有和空是一体两面，不偏不堕", "色不是空，空不是色"], "correct": 2, "explain": "二谛中道——物质现象的当下就是空性，空性也不离物质现象。有和空是一体两面。"}, {"q": "对比手法在《法华经》「开权显实」中的作用是？", "opts": ["贬低三乘", "显影权实关系——三乘是方便门，一佛乘是真实相", "否定小乘修行", "证明法华经最高"], "correct": 1, "explain": "对比是「权实」关系的显影。通过三乘（权）与一佛乘（实）对比，知何者方便、何者真实。"}, {"q": "佛说法的次第（阿含→方等→般若→法华）中，前三时属于什么？", "opts": ["实教", "权教——因根未熟而施设的方便", "密教", "顿教"], "correct": 1, "explain": "阿含、方等、般若皆属「权」——因众生根未熟而施设的方便。至法华时根熟，方显「实」。"}, {"q": "对比手法中「防混淆」的功能主要体现在？", "opts": ["防止听众混淆法师的话", "防止听众混淆不同经典", "权实一比，知何者是方便、何者是真实", "防止听众混淆大小乘"], "correct": 2, "explain": ""}]}, {"id": "quiz-9", "title": "反问 / 设疑", "questions": [{"q": "赵州禅师对「狗子还有佛性也无」的回答是？", "opts": ["有", "无", "既有既无", "不答"], "correct": 1, "explain": "依经教「一切众生皆有佛性」，狗应有。然赵州答「无！」——截断学人的概念知解。"}, {"q": "赵州「无」字话头的「无」是什么意思？", "opts": ["狗确实没有佛性", "佛性不存在", "非断灭无，是逼人离「有无」两边之活句", "赵州说错了"], "correct": 2, "explain": "此「无」非断灭无，而是活句——截断「有佛性」的概念执，逼其离有无两边。"}, {"q": "六祖「风幡」公案中，六祖说「不是风动，不是幡动」下一句是？", "opts": ["是空气在动", "仁者心动", "都没有动", "是佛在动"], "correct": 1, "explain": "六祖曰「不是风动，不是幡动，仁者心动。」破「动」之执，点出争论源于自心妄识。"}, {"q": "反问手法「制造认知失调」的目的是？", "opts": ["让听众难堪", "显示法师高明", "人遇「答不上」会不舒服，这不适正是求悟的动力", "考验听众知识"], "correct": 2, "explain": "「小疑小悟，大疑大悟，不疑不悟」。疑情是觉悟的燃料。"}, {"q": "「念佛的是谁」这个反问的作用是？", "opts": ["质疑念佛的功德", "返观能念之心——由「所念」回头向「能念」，禅净融通之反问", "劝人不要念佛", "考问念佛者的身份"], "correct": 1, "explain": "返观能念之心，由所念（佛号）回头向能念（心），是禅净融通之反问。"}, {"q": "反问手法中「破知识障」的意思是？", "opts": ["佛教知识是有障碍的", "直接给答案，听者只记概念；让他自己参破，才是真悟", "知识越多越障碍", "不需要学习知识"], "correct": 1, "explain": "直接给答案，听者只记概念（死知识），非真悟。反问让他自己参破，才是真悟。"}, {"q": "反问操作步骤中「悟后须明师印证」的原因是？", "opts": ["自己悟的不算数", "防止堕光影——自以为悟实则非悟，须过来人勘验", "明师有认证权", "印证后才能继续修行"], "correct": 1, "explain": "防止「堕光影」（自以为悟实则落入意识境界）。须有实证经验的过来人勘验。"}, {"q": "「疑情为舟」的完整表述是？", "opts": ["疑情越多越好", "疑到「山穷水尽」，忽一转身，桶底脱落", "疑情是修行的障碍", "疑情等于怀疑"], "correct": 1, "explain": "疑到「山穷水尽」（所有思维路径都走不通），忽一转身（离思议），桶底脱落（顿悟）。"}, {"q": "风幡公案中，六祖要破的「能所二取」指的是什么？", "opts": ["风和幡的对立", "心识分别「能动/被动」的对立——都源于自心妄识", "风大和幡大的对立", "动和静的对立"], "correct": 1, "explain": "能所二取——心识分别「能动者」与「被动者」，这二元对立本身就是妄识。"}, {"q": "反问手法与问答手法的主要区别是？", "opts": ["没有区别", "反问只用于禅宗，问答用于所有宗派", "问答会给出答案（破执显正），反问不急给答案，令疑情生逼其自参", "反问比问答更简单"], "correct": 2, "explain": ""}]}, {"id": "quiz-10", "title": "实物 / 动作演示", "questions": [{"q": "拈花微笑公案中，佛拈的是什么花？", "opts": ["莲花", "金波罗华", "玉兰花", "曼陀罗花"], "correct": 1, "explain": "大梵天王献金波罗华，请佛说法。佛默然拈华示众，不置一词。"}, {"q": "拈花微笑中，谁破颜微笑、成为禅宗初祖？", "opts": ["阿难", "大迦叶", "舍利弗", "目犍连"], "correct": 1, "explain": "百万闻法众中唯大迦叶破颜微笑。佛宣告付嘱摩诃迦叶，成禅宗西天初祖。"}, {"q": "俱胝一指公案中，俱胝和尚断童子指的目的是？", "opts": ["惩罚童子模仿", "测试童子胆量", "去「模仿的相」，方见「活的指」", "教童子不要竖指"], "correct": 2, "explain": "一指象征「一心全体」。断指去其「模仿的相」，童子方见「活的指」（真法非形式）。"}, {"q": "演示手法「非语言沟通」的优势在于？", "opts": ["不需要语言能力", "有些境界离言，动作比语言直接（拈花一笑，不立文字）", "动作比语言更快", "动作比语言更有趣"], "correct": 1, "explain": "有些境界离言（言语道断），用语言说反而添妄。动作比语言直接。"}, {"q": "演示手法「冲击注意」的原理是？", "opts": ["动作让人害怕", "突然而来的动作打破听众惯性思维，制造「顿悟窗口」", "动作让人兴奋", "动作让人好奇"], "correct": 1, "explain": "突然而来的动作（如棒喝、断指），打破惯性思维流，制造「顿悟窗口」。"}, {"q": "禅宗「教外别传，不立文字」与哪种手法最对应？", "opts": ["引经据典", "偈颂", "实物/动作演示", "问答"], "correct": 2, "explain": "演示手法体现禅宗「教外别传，不立文字」精神——以无言传无相法。"}, {"q": "演示手法「具身记忆」的意思是？", "opts": ["动作能锻炼身体", "动作记忆深刻——你忘不了一个竖指、一棒、一喝", "身体好才能修行", "动作能治病"], "correct": 1, "explain": "动作记忆比语言记忆更深刻。你忘不了一个竖指、一棒、一喝。"}, {"q": "法师日常演示中「举钵」说法的法义是？", "opts": ["钵是法器", "「这饭碗就是福田，你惜福，福就长」", "钵代表空性", "举钵表示供养"], "correct": 1, "explain": "举钵说法：「这饭碗就是福田，你惜福，福就长。」以日用器物说法。"}, {"q": "演示手法的操作步骤第四步「令会者于言外得旨」意味着？", "opts": ["必须解释演示的含义", "不直接说破，让有缘者在动作之外自悟其意", "所有人都能理解", "只有法师知道意思"], "correct": 1, "explain": "不直接说破，让有缘者在动作之外自悟其意——如拈花唯迦叶微笑。"}, {"q": "拈花微笑公案的「法义点」是？", "opts": ["花代表美丽", "微笑表示礼貌", "最极的演示——以「无言」传「无相法」；心心相印，不假文字", "花是供养佛的"], "correct": 2, "explain": ""}]}, {"id": "quiz-11", "title": "唱诵 / 梵呗", "questions": [{"q": "汉地梵呗之始传为谁所创？", "opts": ["支谦", "曹植（陈思王）", "康僧会", "鸠摩罗什"], "correct": 1, "explain": "东汉末，陈思王曹植游鱼山，闻岩谷水声，乃仿其声制梵呗——汉地梵呗之始。"}, {"q": "「声入八识」中「八识」指的是？", "opts": ["八种感觉", "阿赖耶识——音声直入最深层的意识，潜移默化", "八种修行阶段", "八正道"], "correct": 1, "explain": "八识指阿赖耶识（第八识）。音声直入阿赖耶，「一历耳根，永为道种」。"}, {"q": "焰口施食的缘起与哪位佛弟子有关？", "opts": ["舍利弗", "阿难", "目犍连", "须菩提"], "correct": 1, "explain": "阿难夜见饿鬼（面然），告佛。佛说《救拔焰口饿鬼陀罗尼》。"}, {"q": "唱诵手法「摄散入定」的原理是？", "opts": ["唱诵能催眠", "唱诵节奏引心专注，散乱顿息", "唱诵让人忘记烦恼", "唱诵能消耗体力"], "correct": 1, "explain": "唱诵有节律，节律引心专注。心随音声节奏走，散乱自然止息。"}, {"q": "曹植创鱼山梵呗之前，汉地讽诵用什么音调？", "opts": ["中土民乐", "西域音调——汉人难解", "印度原始音调", "没有固定音调"], "correct": 1, "explain": "此前胡僧来华，讽诵依西域音调，汉人难解。曹植以中土宫商谱之，梵呗始汉化。"}, {"q": "称名念佛「南无阿弥陀佛」属于哪种手法？", "opts": ["引经据典", "反问", "唱诵/梵呗", "偈颂"], "correct": 2, "explain": "称名念佛以声摄心，以心归佛，是最简单之「唱诵」，三根普被。"}, {"q": "唱诵的常见误区「执声迷义」指的是？", "opts": ["声音太大听不清", "只图腔调好听，忘失经义", "执着于某一种腔调", "声音太小没效果"], "correct": 1, "explain": "「执声迷义」——只图腔调好听，忘失经义。唱后须略说其义，音声与义理双运。"}, {"q": "唱诵手法「共修凝聚力」体现在？", "opts": ["人多力量大", "大众同唱，气势与归属感强", "共修时声音更响", "共修时更省力"], "correct": 1, "explain": "大众同唱，气势与归属感强。共修的凝聚力是唱诵的独特优势。"}, {"q": "鱼山梵呗的创立体现了什么法义？", "opts": ["音乐比语言重要", "方便随方——随地域文化调整方便", "只有鱼山的音声最好", "梵呗必须有水声"], "correct": 1, "explain": "曹植以中土宫商谱梵呗，令汉人易入。体现「方便随方」——随地域文化调整方便。"}, {"q": "唱诵操作步骤第四步「唱后略说其义」的目的是？", "opts": ["考验听众", "音声与义理双运——不只唱还要懂", "延长法会时间", "展示法师学识"], "correct": 1, "explain": ""}]}, {"id": "quiz-12", "title": "图像 / 变相", "questions": [{"q": "敦煌壁画《九色鹿》据哪部经典绘制？", "opts": ["《法华经》", "《鹿王本生》", "《华严经》", "《观无量寿经》"], "correct": 1, "explain": "壁画据《鹿王本生》绘于莫高窟。九色神鹿救溺人，溺人背恩贪赏引王猎鹿，终遭报。"}, {"q": "图像手法的最大优势是？", "opts": ["比文字更美", "文盲、童稚、异语者，看图即懂——视觉直入", "保存更久", "制作更简单"], "correct": 1, "explain": "视觉直入——文盲、童稚、异语者，看图即懂。图像突破文字壁垒。"}, {"q": "曼荼罗（坛城）在密教中表什么？", "opts": ["佛的画像", "法界——胎藏界显「理」，金刚界显「智」", "寺庙平面图", "装饰图案"], "correct": 1, "explain": "密教以曼荼罗表法界。胎藏界显「理」（理具万行），金刚界显「智」（智断次第）。"}, {"q": "图像手法「象征密度高」的意思是？", "opts": ["图像颜色多", "一幅曼荼罗含摄全体教理（方位、本尊、种子字）", "图像画得很密", "一幅画有很多人物"], "correct": 1, "explain": "象征密度高——一幅曼荼罗含摄全体教理。方位、本尊、种子字各有表法含义。"}, {"q": "九色鹿故事中，溺人背恩的报应是什么？", "opts": ["被鹿踢死", "周身生疮", "被国王处死", "堕地狱"], "correct": 1, "explain": "溺人贪赏引王猎鹿，背恩之报——周身生疮。壁画让丝路商旅、村妇一眼即懂因果。"}, {"q": "图像手法背后的见解「以像表法」意味着？", "opts": ["佛像就是佛", "相即性之显；像非偶像，是「法之载体」", "造像越多功德越大", "只有佛的像才能表法"], "correct": 1, "explain": "以像表法——相即性之显；像非偶像，是「法之载体」。不可执像为神。"}, {"q": "图像手法的常见误区「执像为神」指的是？", "opts": ["像太大太庄严", "偶像崇拜——迷于相，把法之载体当法本身", "像太小不够庄严", "画像不够精美"], "correct": 1, "explain": "执像为神（偶像崇拜）＝迷于相。像非偶像，是法之载体。执像则失表法本意。"}, {"q": "水陆画在法会中的作用是？", "opts": ["装饰道场", "以画召请六道鬼神，普度幽冥——图像是「普度的请柬」", "记录法会盛况", "供人欣赏"], "correct": 1, "explain": "水陆画以画召请六道鬼神，普度幽冥。图像是「普度的请柬」。"}, {"q": "图像手法「长久熏习」的优势是？", "opts": ["画像不会损坏", "像立千年，持续教化", "画比文字保存更久", "画不需要更新"], "correct": 1, "explain": "长久熏习——像立千年，持续教化。壁画、造像千年仍向见者说法。"}, {"q": "图像手法的操作步骤中「指画说法」的意思是？", "opts": ["画画给人看", "指画说法：「此画中……即是……」——边指画边讲解法义", "用手画画", "画完就结束"], "correct": 1, "explain": ""}]}, {"id": "quiz-13", "title": "十二部经（体裁即讲法）", "questions": [{"q": "十二部经是？", "opts": ["十二本书", "十二种经文体裁，本身也是讲法方式", "十二部大乘经典", "十二部小乘经典"], "correct": 1, "explain": "十二部经（十二分教）是佛教学者对一代时教的体裁归纳，每一「部」既是一种经文体裁，也是一种讲法方式。"}, {"q": "「自说」（Udāna 优陀那）的讲法性格是？", "opts": ["以理服人", "无问自说，显佛悲心", "借物说理", "以诗表法"], "correct": 1, "explain": "自说——无人请问，佛主动宣说。如《阿弥陀经》无启问者，佛自说净土。显佛悲心。"}, {"q": "「授记」（Vyākaraṇa）的讲法性格是？", "opts": ["叙事伏笔", "给信心与方向——佛预言弟子「汝于来世当得作佛」", "以比喻说法", "问答辨析"], "correct": 1, "explain": "授记——佛预言弟子未来成佛。讲法性格＝「给信心与方向」。《法华·授记品》。"}, {"q": "「方广」（Vaipulya 毘佛略）的讲法性格是？", "opts": ["以神变摄信", "说深妙理、境界无量", "便于记诵", "以弟子宿缘显因果"], "correct": 1, "explain": "方广——广大深妙之教。讲法性格＝「说深妙理、境界无量」。《华严》《大般若》。"}, {"q": "「论议」（Upadeśa 优波提舍）的讲法性格是？", "opts": ["以理服人——问答辨析、逻辑讨论", "以事显法", "以像表法", "无问自说"], "correct": 0, "explain": "论议——问答辨析、逻辑讨论。讲法性格＝「以理服人」。《大智度论》即论议体。"}, {"q": "「本生」（Jātaka 阇陀伽）的讲法性格是？", "opts": ["以佛因地显菩萨道", "借物说理", "给信心与方向", "说深妙理"], "correct": 0, "explain": "本生——佛过去生修行故事。讲法性格＝「以佛因地显菩萨道」。舍身饲虎等。"}, {"q": "《阿弥陀经》属于十二部经中的哪一部？", "opts": ["契经", "重颂", "自说", "譬喻"], "correct": 2, "explain": "《阿弥陀经》无启问者，佛自说净土，属于「自说」（Udāna）。显佛悲心——无人问而自说。"}, {"q": "一部经常兼多种体裁。以下说法正确的是？", "opts": ["每部经只属一种体裁", "《法华》有契经、重颂、譬喻、授记等多种", "十二部经就是十二部书", "大乘经不属于十二部"], "correct": 1, "explain": "十二部非「十二本书」，是「十二种体裁」。一部经常兼多种——如《法华》有契经、重颂、譬喻、授记等。"}, {"q": "「孤起颂」（Gāthā 伽陀）与「重颂」的区别是？", "opts": ["孤起颂更长", "孤起颂不依前文独立成颂，重颂是散文后重说", "孤起颂更短", "没有区别"], "correct": 1, "explain": "孤起颂——不依前文、独立成颂。重颂——散文后以偈重说一遍。"}, {"q": "「因缘」（Nidāna 尼陀那）的讲法性格是？", "opts": ["以理服人", "叙事伏笔——交代「因何缘起而说此经」", "借物说理", "以神变摄信"], "correct": 1, "explain": ""}]}, {"id": "quiz-14", "title": "应机施教的框架（四悉檀/化仪四教/三转法轮）", "questions": [{"q": "四悉檀中，先令听众欢喜生信的是？", "opts": ["世界悉檀", "为人悉檀", "对治悉檀", "第一义悉檀"], "correct": 0, "explain": "世界悉檀——顺世间情宜而说，先令欢喜生信。如佛说布施得福，顺世人求福之心。"}, {"q": "四悉檀中，针对具体烦恼下药的是？", "opts": ["世界悉檀", "为人悉檀", "对治悉檀", "第一义悉檀"], "correct": 2, "explain": "对治悉檀——针对具体烦恼下药。贪者不净观，嗔者慈悲观，痴者因缘观。"}, {"q": "四悉檀中，终指诸法实相、究竟真理的是？", "opts": ["世界悉檀", "为人悉檀", "对治悉檀", "第一义悉檀"], "correct": 3, "explain": "第一义悉檀——终指诸法实相、究竟真理。前三是「权」，此一是「实」。"}, {"q": "化仪四教中，「顿」的特点是？", "opts": ["由浅入深", "直下全提，不假阶次", "同听异闻", "随人得益不同"], "correct": 1, "explain": "顿——直下全提，不假阶次。如《华严》对圆顿大根，说「初发心时便成正觉」。"}, {"q": "化仪四教中，「渐」的例子是？", "opts": ["《华严》对圆顿大根", "阿含→方等→般若→法华，由浅入深", "同听一味各人异解", "随人得益无定"], "correct": 1, "explain": "渐——由浅入深。阿含（破执）→方等（弹偏）→般若（说空）→法华（显实）。"}, {"q": "三转法轮中，第一步「示相转」是？", "opts": ["劝「苦应知、集应断」", "开示「此是苦、此是集、此是灭、此是道」——先让你「认识」", "佛以果证「我已知苦」", "令众生发菩提心"], "correct": 1, "explain": "示相转——开示「此是苦（逼迫性）、此是集（招感性）、此是灭（可证性）、此是道（可修性）」。先认识。"}, {"q": "三转法轮中，第三步「作证转」是？", "opts": ["开示四谛", "劝修四谛", "佛以果证「我已知苦、已断集、已证灭、已修道」——最后「印证」", "令众生发愿"], "correct": 2, "explain": "作证转——佛以果证「我已知苦、已断集、已证灭、已修道，此法真实不虚」。最后印证。"}, {"q": "四悉檀中，看个人根性因材施教的是？", "opts": ["世界悉檀", "为人悉檀", "对治悉檀", "第一义悉檀"], "correct": 1, "explain": "各各为人悉檀（为人悉檀）——看个人根性因材施教。对持戒者说戒功德，对智慧者说空。"}, {"q": "化仪四教中，「秘密」的意思是？", "opts": ["佛秘密传法", "同听一味，各人异解，互不相知（「同听异闻」）", "密教修行", "不公开说法"], "correct": 1, "explain": "秘密——同听一味，各人异解，互不相知。佛以一音说法，众生随类得解而互不知。"}, {"q": "三转法轮的意义是？", "opts": ["必须三步讲完", "任何一场有效讲法都暗合「认知→行动→印证」三转", "只有初转法轮用", "三步缺一不可"], "correct": 1, "explain": ""}]}, {"id": "quiz-15", "title": "根本原则——方便（upāya）", "questions": [{"q": "「方便」（upāya）的准确含义是？", "opts": ["不究竟的方法", "为达究竟目的而施设的善巧方法——「究竟的善巧显现」", "随便应付", "临时的凑合"], "correct": 1, "explain": "方便译自 upāya，意「善巧方便」——为令众生入佛知见而施设的种种善巧方法。它不是「不究竟」，而是「究竟的善巧显现」。"}, {"q": "「诸佛以一大事因缘出现于世」的「大事因缘」是？", "opts": ["讲经说法", "让众生「开示悟入」佛之知见", "建立僧团", "示现神通"], "correct": 1, "explain": "一切佛降生到这世上，只为了让众生「开、示、悟、入」佛的知见（觉悟真理、成佛）。"}, {"q": "方便的「桥梁」功能是？", "opts": ["连接此岸和彼岸的桥", "众生在彼岸，佛在此岸说法，方便是桥", "连接大小乘的桥", "连接古今的桥"], "correct": 1, "explain": "方便是架在「佛（此岸说法者）」和「众生（彼岸迷惑者）」之间的一座桥。"}, {"q": "「权实不二」的含义是？", "opts": ["权和实是两个东西", "方便是「权」，实相是「实」；然权即实之巧施，非离实别有方便", "权比实低一级", "实比权高一级"], "correct": 1, "explain": "权实不二——方便是「权」，实相是「实」；然权即实之巧施，非离实别有方便。《法华》「开权显实」。"}, {"q": "方便的操作要领「应病与药」的意思是？", "opts": ["法师生病也要说法", "听众患何烦恼，即予何法，不执一法", "药越贵越好", "一种药治百病"], "correct": 1, "explain": "应病与药——听众患何烦恼，即予何法，不执一法。如同医生对症下药。"}, {"q": "「契理契机」中「契理」和「契机」分别指？", "opts": ["契理=合佛法，契机=合根器", "契理=合逻辑，契机=合机会", "契理=合理，契机=合时机", "契理=合天理，契机=合人机"], "correct": 0, "explain": "契理——不违实相（合佛法真理）；契机——顺众生根器（合听众条件）。方便之尺度：越契理方便越广，越契机方便越巧。"}, {"q": "方便的「弹性」体现在？", "opts": ["佛法可以随意改变", "佛法能随地域、时代、根器而变化（汉传、藏传、南传各异其方便，同契一实相）", "方便就是随便", "佛法随时在变"], "correct": 1, "explain": "正因为「方便」，佛法才能随地域、时代、根器而变化。汉传、藏传、南传各异其「方便」，同契一实相。"}, {"q": "《法华》三车喻是方便的典型。以下说法正确的是？", "opts": ["三车是究竟", "以羊鹿牛三车（权）引子出火宅，终赐大白牛车（实）——方便之典型", "大白牛车也是方便", "三车和大车没有区别"], "correct": 1, "explain": "以三车（权）引子出火宅，终赐大白牛车（实）——方便的典型。权终归实。"}, {"q": "维摩诘「入不二法门」中，对利根说「默然」是什么？", "opts": ["不回答", "最高方便——对利根者，默然即是最极的善巧", "表示不屑", "表示无奈"], "correct": 1, "explain": "维摩诘对利根说「默然」，即是最高方便——对根机已熟者，不须言说，默然即摄。"}, {"q": "方便的现代启示是？", "opts": ["目标和方法都可以灵活", "目标坚定（契理），方法灵活（契机）——教育、管理、沟通皆需方便", "方法和目标都随意", "只要结果好手段不重要"], "correct": 1, "explain": ""}]}, {"id": "quiz-16", "title": "禅宗", "questions": [{"q": "禅宗自称的核心纲领是？", "opts": ["依经解义", "教外别传，不立文字，直指人心，见性成佛", "念佛求生净土", "判教体系"], "correct": 1, "explain": "禅宗自称「教外别传，不立文字，直指人心，见性成佛」。不依赖经教次第，以「顿悟」为归。"}, {"q": "达摩安心公案中，慧可说「觅心了不可得」后，达摩如何回应？", "opts": ["继续追问", "「我与汝安心竟」", "打慧可一棒", "令慧可离去"], "correct": 1, "explain": "达摩「将心来，与汝安！」慧可「觅心了不可得。」达摩「我与汝安心竟。」——心本不可得，安即得。"}, {"q": "赵州「吃茶去」公案中，赵州对院主说「吃茶去」的目的是？", "opts": ["请院主喝茶", "以「吃茶去」一语扫却分别，显「不二」——无论新故，喝茶的「这个」无别", "测试院主茶艺", "惩罚院主"], "correct": 1, "explain": "院主分别「曾到/不曾到」，落二边。赵州以「吃茶去」扫却分别，显平常心是道。"}, {"q": "百丈野狐公案中，老人前世错答什么导致堕野狐身五百世？", "opts": ["「不落因果」", "「不昧因果」", "「无因果」", "「有因果」"], "correct": 0, "explain": "老人答「大修行人‘不落因果’」（落断见），堕五百世野狐。百丈改答「不昧因果」，脱身。"}, {"q": "百丈野狐公案中，百丈的正确回答是？", "opts": ["「不落因果」", "「不昧因果」", "「无因果」", "「有因果」"], "correct": 1, "explain": "「不昧因果」——大修行人照样落在因果里，只是不迷惑、不恐惧、不造恶业。一字之差，天渊之别。"}, {"q": "德山棒的手法特点是？", "opts": ["打错的人", "无论你说得对不对，皆棒——「道得也三十棒，道不得也三十棒」", "只打弟子", "用棒指路"], "correct": 1, "explain": "德山上堂「道得也三十棒，道不得也三十棒。」——无论对错皆棒，逼离「说」之执。"}, {"q": "临济喝有四样，以下哪项不是？", "opts": ["如金刚王宝剑", "如踞地金毛狮子", "如探竿影草", "如雷霆万钧"], "correct": 3, "explain": "四喝：一喝如金刚王宝剑（斩妄执）、如踞地金毛狮子（震慑）、如探竿影草（探虚实）、不作一喝用（泯绝）。"}, {"q": "六祖惠能闻哪句经文而悟入？", "opts": ["「应无所住而生其心」", "「诸恶莫作」", "「色即是空」", "「阿弥陀佛」"], "correct": 0, "explain": "惠能卖柴过客店，闻客诵《金刚经》「应无所住而生其心」，恍然有省，赴黄梅弘忍。"}, {"q": "丹霞烧佛公案的法义点是？", "opts": ["木佛可以烧", "破偶像执——真佛非木", "取暖无罪", "舍利在木佛中"], "correct": 1, "explain": "丹霞取木佛烧火取暖。院主诃之，丹霞「我觅舍利」「木佛何有舍利」——破偶像执，真佛非木。"}, {"q": "参话头（看话禅）的操作中，以下哪步是正确的？", "opts": ["择话头→思维分析→得出结论→验证", "择话头→行住坐卧提起→不思维卜度只「疑」着→疑团将破→遇缘触着豁然打破", "择话头→念诵→计数→回向", "择话头→查阅资料→讨论→总结"], "correct": 1, "explain": ""}]}, {"id": "quiz-17", "title": "净土宗", "questions": [{"q": "净土宗的「三资粮」是？", "opts": ["戒定慧", "信、愿、行", "闻思修", "觉正净"], "correct": 1, "explain": "以「信、愿、行」三资粮，持名念佛，求生阿弥陀佛极乐净土。"}, {"q": "中国净土宗初祖是？", "opts": ["善导大师", "慧远大师", "昙鸾大师", "印光大师"], "correct": 1, "explain": "东晋慧远在庐山东林寺结白莲社，率百二十三贤共期往生净土，创中国净土门庭。"}, {"q": "净土宗被称为「易行道」的原因是？", "opts": ["不用修行", "念佛「下手易、成功高」——老弱、识字不识字皆能念", "只念佛号", "不用持戒"], "correct": 1, "explain": "比起禅之「难行」，念佛「下手易、成功高」。普摄群机——老弱、识字不识字，皆能念。"}, {"q": "善导大师被尊为什么化身？", "opts": ["释迦牟尼佛", "阿弥陀佛", "观世音菩萨", "大势至菩萨"], "correct": 1, "explain": "善导每念佛一声即有一道光明从口出，著《观经四帖疏》，力倡「一切善恶凡夫皆可念佛往生」。被尊为弥陀化身。"}, {"q": "昙鸾大师「舍仙归净」的故事中，谁劝他归向净土？", "opts": ["慧远大师", "菩提流支", "善导大师", "达摩"], "correct": 1, "explain": "昙鸾本习仙道求长寿，北归遇菩提流支。支曰「此方何足贵？吾有《观无量寿经》，念佛往生，寿同无量。」鸾遂焚仙经。"}, {"q": "净土宗「他力本愿」的意思是？", "opts": ["不靠自己修行", "乘阿弥陀佛本愿力，非凡夫自力可拟", "只靠佛不靠法", "佛替你修行"], "correct": 1, "explain": "他力本愿——乘阿弥陀佛本愿力（十念必生），非凡夫自力可拟。净土是他力法门。"}, {"q": "持名念佛的操作中「三业相应」指？", "opts": ["身口意三业", "口念、耳听、心忆——三业相应", "身拜、口念、心观", "身行、口说、心念"], "correct": 1, "explain": "摄心称念：口念、耳听、心忆，三业相应。以计数（念珠/计数器）防散。"}, {"q": "少康法师摄化童稚的手法是？", "opts": ["讲故事", "以「图像（佛从口出）」+「唱诵」+「故事感化」三法合一", "讲道理", "打坐示范"], "correct": 1, "explain": "少康令小儿念佛，念一声口中出一佛，念十声出十佛，如连珠状。三法合一摄化童稚。"}, {"q": "净土宗「横超生死」的意思是？", "opts": ["慢慢了生死", "一生净土，即超轮回，不待历劫", "在世间了生死", "靠自力了生死"], "correct": 1, "explain": "横超生死——一生净土，即超轮回，不待历劫。如竹虫横咬穿出，不须一节节往上。"}, {"q": "印光大师弘法的核心主张是？", "opts": ["参禅悟道", "「老实念佛，莫换题目」", "研究教理", "修密法"], "correct": 1, "explain": ""}]}, {"id": "quiz-18", "title": "天台宗", "questions": [{"q": "天台宗的宗骨经典是？", "opts": ["《华严经》", "《法华经》", "《楞严经》", "《解深密经》"], "correct": 1, "explain": "天台宗以《法华》为宗骨，立「一念三千、三谛圆融、一心三观」，以「五时八教」判摄一代时教。"}, {"q": "天台「五重玄义」是解经通法，其五步是？", "opts": ["序正流通", "释名、辨体、明宗、论用、判教", "信解行证", "教理行果"], "correct": 1, "explain": "五重玄义：①释名（解经题）②辨体（明所依体＝实相）③明宗（修行宗要）④论用（力用）⑤判教（所属教相）。"}, {"q": "天台「一心三观」是？", "opts": ["观过去现在未来", "观空（破假实）→观假（立一切法）→观中（空假不二），于一念心具观三谛", "观身受心法", "观苦集灭道"], "correct": 1, "explain": "一心三观：观空（破假实）→观假（立一切法）→观中（空假不二），于一念心具观三谛（空假中）。"}, {"q": "天台「五时」的顺序是？", "opts": ["阿含→华严→方等→般若→法华", "华严→鹿苑（阿含）→方等→般若→法华涅槃", "般若→阿含→方等→华严→法华", "方等→阿含→华严→般若→法华"], "correct": 1, "explain": "五时：华严时→鹿苑时（阿含）→方等时→般若时→法华涅槃时。由浅入深，终显圆教。"}, {"q": "湛然「无情有性」的意思是？", "opts": ["植物没有佛性", "草木瓦石皆有佛性——扩如来藏义，显法界一体", "只有无情才有佛性", "无情即有情"], "correct": 1, "explain": "唐湛然倡「无情有性」——草木瓦石皆有佛性。破「唯有情有性」之局，显法界一体。"}, {"q": "天台「化法四教」是？", "opts": ["顿渐秘密不定", "藏、通、别、圆", "小乘大乘", "空假中"], "correct": 1, "explain": "化法四教（内容表）：藏、通、别、圆。化仪四教（风格表）：顿、渐、秘密、不定。"}, {"q": "智者大师的「天台三大部」是？", "opts": ["《法华玄义》《法华文句》《摩诃止观》", "《法华经》《涅槃经》《大品般若》", "《维摩诘》《楞严》《华严》", "《大智度论》《中论》《百论》"], "correct": 0, "explain": "天台三大部：《法华玄义》《法华文句》《摩诃止观》。智顗驻天台山讲此三部，奠定天台教观。"}, {"q": "天台宗「三谛圆融」的「三谛」是？", "opts": ["真俗中", "空假中", "空有非", "真妄如"], "correct": 1, "explain": "三谛：空谛（破假实）、假谛（立一切法）、中谛（空假不二）。三谛圆融——不偏空有。"}, {"q": "天台判教中，《法华》属于什么教？", "opts": ["藏教", "通教", "别教", "圆教"], "correct": 3, "explain": "《法华》是第五时圆教，会三归一，开权显实。圆教是天台四教（藏通别圆）中最圆满的。"}, {"q": "天台宗「权实不二」的判教意义是？", "opts": ["分高下", "判教非分高下，是显「皆佛方便、终归一实」", "权比实低", "实比权高"], "correct": 1, "explain": ""}]}, {"id": "quiz-19", "title": "华严宗", "questions": [{"q": "华严宗的宗经是？", "opts": ["《法华经》", "《华严经》", "《涅槃经》", "《解深密经》"], "correct": 1, "explain": "华严宗以《华严经》为宗，立「法界缘起、理事无碍、周遍含容」。"}, {"q": "法藏「金狮子章」中，「金」和「狮子」分别代表什么？", "opts": ["金=事，狮子=理", "金=理（本体），狮子=事（现象）", "金=真，狮子=俗", "金=空，狮子=有"], "correct": 1, "explain": "法藏执金狮子：狮子相是「事」（现象），金性是「理」（本体）。理遍于事，事揽理成。"}, {"q": "华严宗「法界三观」的第三观是？", "opts": ["真空绝相观", "理事无碍观", "周遍含容观（一多相即、重重无尽）", "一心三观"], "correct": 2, "explain": "法界三观：①真空绝相观②理事无碍观③周遍含容观（一多相即、重重无尽）。"}, {"q": "帝释网喻说明什么法义？", "opts": ["网能捕鱼", "一即一切，一切即一——法界缘起，重重无尽", "网象征束缚", "帝释天最强"], "correct": 1, "explain": "帝释殿网珠珠相映，一珠现一切珠影，一切珠影入一珠，重重无尽。表法界缘起。"}, {"q": "华严宗「理事无碍」的意思是？", "opts": ["理和事对立", "理（真如）遍在事（万法），事揽理成——金与狮子不一不二", "理比事高", "事比理重要"], "correct": 1, "explain": "理事无碍——理遍在事，事揽理成。金与狮子不一不二。狮子生灭，金性不动——不变随缘，随缘不变。"}, {"q": "法藏给武则天讲法界缘起，用的是什么做比喻？", "opts": ["莲花", "殿前金狮子", "帝释网", "大海"], "correct": 1, "explain": "武则天读《华严》不解「法界缘起」，法藏以殿前金狮子为喻开示，成《金狮子章》。"}, {"q": "华严宗「十玄门」说明什么？", "opts": ["十个修行阶段", "缘起无碍——同时具足、广狭自在、一多相即、隐显俱成等", "十种境界", "十种法门"], "correct": 1, "explain": "十玄门（智俨、法藏）显缘起无碍——同时具足、广狭自在、一多相即、隐显俱成等。"}, {"q": "华严宗「六相圆融」的六相是？", "opts": ["总别、同异、成坏", "色空、真俗、顿渐", "空假中、真妄如", "总别、同异、因果"], "correct": 0, "explain": "六相圆融：总别、同异、成坏，六相无碍。显一切法相即相入。"}, {"q": "杜顺在华严宗的地位是？", "opts": ["三祖", "初祖——创「法界三观」，为华严观法奠基", "五祖", "二祖"], "correct": 1, "explain": "杜顺（557–640），华严初祖，创「法界三观」，为华严观法奠基。"}, {"q": "华严宗「周遍含容」的意思是？", "opts": ["到处都有", "一微尘中含容法界，如因陀罗网——一即一切", "容纳万物", "周遍宇宙"], "correct": 1, "explain": ""}]}, {"id": "quiz-20", "title": "唯识宗（法相宗）", "questions": [{"q": "唯识宗的核心主张是？", "opts": ["万法皆空", "万法唯识——外境非实，皆是识所变", "万法实有", "万法无常"], "correct": 1, "explain": "依《瑜伽师地论》《成唯识论》，立「万法唯识」——外境非实，皆是识所变（如梦中所见）。"}, {"q": "唯识宗的「八识」中，第八识是？", "opts": ["意识", "末那识", "阿赖耶识", "眼识"], "correct": 2, "explain": "八识：眼耳鼻舌身意（前六识）＋末那识（第七识）＋阿赖耶识（第八识）。阿赖耶含藏一切种子。"}, {"q": "「转识成智」是将八识转成几智？", "opts": ["三智", "四智", "五智", "六智"], "correct": 1, "explain": "转八识成四智：成所作智、妙观察智、平等性智、大圆镜智。把迷妄的心识转成觉悟的智慧。"}, {"q": "唯识「三性」中，属于「妄执」（空的、不存在的）的是？", "opts": ["遍计所执性", "依他起性", "圆成实性", "依他起和圆成实"], "correct": 0, "explain": "遍计所执性＝胡乱分别、硬加上去的错误执着，是空的。依他起（缘生）有，圆成实（真如）是。"}, {"q": "玄奘在那烂陀寺师从谁学《瑜伽师地论》？", "opts": ["戒贤", "戒日王", "龙树", "无著"], "correct": 0, "explain": "玄奘历十七年至天竺，师戒贤于那烂陀寺，学《瑜伽师地论》。曲女城大会立「真唯识量」，无人能破。"}, {"q": "唯识宗「五重唯识观」的第一重是？", "opts": ["摄末归本", "遣虚存实（遣遍计，存依圆）", "隐劣显胜", "遣相证性"], "correct": 1, "explain": "五重唯识观：①遣虚存实②舍滥留纯③摄末归本④隐劣显胜⑤遣相证性。"}, {"q": "因明立量的三支是？", "opts": ["宗因喻", "宗因合", "宗因结", "宗因举例"], "correct": 0, "explain": "因明立量：①宗（主张，如「声是无常」）②因（理由，如「所作性故」）③喻（例证，如「如瓶」）。"}, {"q": "「真唯识量」是谁立的？", "opts": ["窥基", "玄奘", "戒贤", "无著"], "correct": 1, "explain": "玄奘将赴印前于边界立量「真唯识量」，明示「色不离识」，赴印途中以此量无人能破。"}, {"q": "唯识宗「三性三无性」中，「依他起性」是？", "opts": ["妄执，空的", "缘生现象层面的「有」", "真如本性", "不存在的"], "correct": 1, "explain": "依他起性＝一切事物靠条件（因缘）才生起，这种现象层面的「有」是有的。修行在依他起上离遍计执，证圆成实。"}, {"q": "玄奘西行求法的根本原因是？", "opts": ["游历西域", "汉译诸本义理乖互，誓游西域求真典", "逃避战乱", "传播汉地佛法"], "correct": 1, "explain": ""}]}, {"id": "quiz-21", "title": "速通手册（综合）", "questions": [{"q": "十二手法的顺口溜是？", "opts": ["喻故例问答，颂引身比对，反演唱图通", "譬喻故事举例问答", "喻故例问，颂引身对，反演唱图", "喻故例问答颂引身比对反演唱图通"], "correct": 0, "explain": "顺口溜：喻故例问答，颂引身比对，反演唱图通。逐字对应十二手法。"}, {"q": "五宗派中，「不靠经书靠自心」的是？", "opts": ["净土宗", "禅宗", "天台宗", "华严宗"], "correct": 1, "explain": "禅宗＝不靠经书靠自心，一句话让你突然明白。最像「师傅点你一下」。"}, {"q": "五宗派中，「念阿弥陀佛求生极乐，谁都能念」的是？", "opts": ["禅宗", "净土宗", "天台宗", "唯识宗"], "correct": 1, "explain": "净土宗＝念「阿弥陀佛」求生极乐，谁都能念。最像「最简单一门课」。"}, {"q": "五宗派中，「把佛法排成系统表，一步步修」的是？", "opts": ["禅宗", "净土宗", "天台宗", "唯识宗"], "correct": 2, "explain": "天台宗＝把佛法排成系统表，一步步修。最像「严谨教学大纲」。"}, {"q": "五宗派中，「世界像网，互相含容，一即一切」的是？", "opts": ["禅宗", "净土宗", "华严宗", "唯识宗"], "correct": 2, "explain": "华严宗＝世界像网，互相含容，一即一切。最像「万花筒/帝释网」。"}, {"q": "五宗派中，「分析你的心识，佛学版心理学+逻辑」的是？", "opts": ["禅宗", "净土宗", "天台宗", "唯识宗"], "correct": 3, "explain": "唯识宗＝分析你的心识，佛学版心理学+逻辑。最像「心理学+逻辑」。"}, {"q": "「方便（upāya）」的大白话解释是？", "opts": ["方便就是随便", "为让你懂，什么招都行", "方便就是简单", "方便就是快捷"], "correct": 1, "explain": "方便的大白话＝为让你懂，什么招都行。"}, {"q": "「观机逗教」的大白话是？", "opts": ["观察机会教导", "看人下菜碟（褒义）", "看机会传教", "观察机械教学"], "correct": 1, "explain": "观机逗教的大白话＝看人下菜碟（褒义）——先观根器再定方法。"}, {"q": "「权/实」的大白话是？", "opts": ["权＝权力，实＝实在", "权＝临时方便，实＝究竟真理", "权＝权利，实＝现实", "权＝权威，实＝实际"], "correct": 1, "explain": "权＝临时方便（拐杖），实＝究竟真理（目的地）。权终归实。"}, {"q": "总纲「观机逗教，应病与药；方便为门，入佛知见」的意思是？", "opts": ["看机会教，给药治病", "看根器选方法，对症下药；以善巧方便为门，令众生入佛的知见", "观察教导，治病给药", "方便入门，看见佛"], "correct": 1, "explain": "总纲：看根器选方法（观机逗教），对症下药（应病与药）；以善巧方便为门（方便为门），令众生觉悟成佛（入佛知见）。"}, {"q": "新手在禅宗最常踩的坑是？", "opts": ["念佛不够虔诚", "把公案当谜语猜", "打坐时间太短", "不读经书"], "correct": 1, "explain": "禅宗新手最常踩的坑：把公案当谜语猜。公案不是猜谜，是逼人离识的活句。"}, {"q": "新手在唯识宗最常踩的坑是？", "opts": ["念佛散乱", "钻名相出不来，忘了「转识成智」目的", "不持戒", "不拜佛"], "correct": 1, "explain": ""}]}], "scenes": [{"num": 1, "title": "丧子母亲来寺院求助", "tags": ["临终关怀", "现身说法", "故事"], "audience": "中年女性，刚失去独子，悲痛欲绝，质疑因果</p>", "situation": "一位母亲在儿子意外去世后来到寺院，哭着问法师：「我儿子这么善良，为什么死的是他？佛说善有善报，报在哪里？」</p>", "method": "现身说法 + 故事（目连救母）+ 譬喻（种子与果实的时间差）</p>", "dharma": "因果通三世——今生之果各有前因，但因果不虚，忏悔与回向可转业。</p>", "analysis": "法师先放下手中事务，请母亲坐下，递一杯温水。不急于讲道理，先安静倾听她哭诉三到五分钟。待她情绪稍缓，轻声说：「我理解您的痛苦，失去孩子是世间最痛的事。」先共情，不评判。\n\n接着讲目连救母的故事：「佛的大弟子目连，神通第一，他证得阿罗汉后，用道眼看到亡母堕入饿鬼道。他以钵盛饭送去，饭到母亲嘴边却化为火炭——个人的力量，连阿罗汉都救不了自己的母亲。最后佛告诉他：要在七月十五僧自恣日，以百味饮食供养十方僧众，借大众和合的力量，才能转业。目连照做了，母亲才脱离苦道。」\n\n停顿片刻，让故事沉淀。然后以譬喻收束：「因果就像种树，种子种下去到结果，中间有时间差。不是不报，时辰未到。您儿子善良的种子，一定有他的果报，只是我们凡夫看不到全貌。」\n\n最后引导行动：「现在最能帮到您儿子的，是为他做功德回向。我们可以一起念一卷《地藏经》，或者您在佛前供一盏灯，把这份功德回向给他。让他因为您的修行而得到利益——这是真正的大孝。」语气平和，不催促，给她时间消化。"}, {"num": 2, "title": "知识分子质疑轮回", "tags": ["问答", "引经", "知识分子"], "audience": "大学教授，逻辑严密，认为轮回不可证实</p>", "situation": "一位哲学系教授听经后质问：「轮回无法用科学证明，佛教凭什么让人信？」</p>", "method": "问答（破执显正）+ 举例（意识流的连续性）+ 引经</p>", "dharma": "轮回非「信则有不信则无」，而是可通过逻辑推理和修行体验渐次验证的。</p>", "analysis": "法师不急于反驳，先肯定对方的严谨态度：「教授问得非常好。科学讲究实证，这是对的态度。佛教其实也不排斥实证——佛陀说的法，都是可以自己验证的。」\n\n然后举例引导：「您昨天的意识流，延续到了今天。您还记得昨晚做的梦吗？那个做梦的心，跟现在思考的心，是同一条意识流。死亡只是身体这个'载体'坏了，但意识流并不会因此断灭——就像水流过一块石头，石头换了，水还在流。」\n\n引《楞严经》七处征心：「佛问阿难：你的心在哪里？在身内？在身外？七次问答，佛把阿难所有关于'心是物质'的预设都破了。心不是大脑的产物，心是非物质的觉知体。这是两千五百年前的'意识研究'。」\n\n最后不强行说服，留余地：「您不妨先不急着下结论。科学也在发展——量子力学已经发现观察者影响被观察者，意识问题远未定论。您可以先试着修观，从观察自己的念头开始，用自己的体验来验证。佛教欢迎质疑，大疑大悟。」"}, {"num": 3, "title": "老年人念不下佛号", "tags": ["唱诵", "举例", "老人"], "audience": "七十岁老奶奶，不识字，想念佛但心散乱</p>", "situation": "老奶奶说：「法师，我也想念佛，但念着念着就想到孙子、想到买菜，心乱得很。」</p>", "method": "唱诵（摄散入定）+ 举例（生活中的专注训练）</p>", "dharma": "以声摄心——念佛的关键不在「不想别的」，而在「听到自己念」。</p>", "analysis": "法师微笑，不批评她心散乱，先肯定：「您能想到念佛，这本身就是善根。心散乱不是您的错，凡夫的心本来就这样，连年轻人都做不到完全不散乱。」\n\n教她十念法：「您念佛的时候，做三件事：第一，嘴巴念出来——南无阿弥陀佛；第二，耳朵听清楚自己念的声音；第三，心里想着佛。口念、耳听、心忆，这三件事同时做，心就没有空去想别的了。就像您切菜——手在切、眼在看、心在想，三件事同时做，就不会切到手。」\n\n拿出念珠递给她：「您用这串念珠，念一声拨一颗。一珠一念，手也有事做了，四件事同时做，心更不容易跑。不用念多，每天定个数字——十圈就好，差不多一千声。念完了就算完成今天的功课。」\n\n最后鼓励：「念头跑了不要紧，发现了就拉回来，拉回来就是在修行。老奶奶念佛，不要求清净心，只要求'念了就好'。您每天念，念久了心自然就定了。阿弥陀佛不嫌弃任何人。」"}, {"num": 4, "title": "年轻人觉得佛法消极", "tags": ["对比", "问答", "年轻人"], "audience": "25岁程序员，认为佛教「消极避世」，与奋斗精神矛盾</p>", "situation": "年轻人直接问：「佛教说一切皆空、不要执着，那我还努力工作干什么？躺平算了。」</p>", "method": "对比（真俗二谛）+ 问答</p>", "dharma": "「空」不是什么都没有，而是「不执着」——努力而不执著结果。真俗不二。</p>", "analysis": "法师直接回应他的核心困惑，不回避：「您把'空'理解成了'什么都没有'，这是最大的误会。佛法说的空，不是说你不用努力了，恰恰相反——空是让你努力但不执着。」\n\n用他能懂的比喻：「您写代码，对吧？您写的时候要认真——架构要设计好，bug要修，这是'有'。但如果一个bug修不好，您就崩溃了、失眠了、跟同事吵架了，这就是'执着'。空是：认真写，但不被结果绑架。bug修好了，很好；修不好，也不天塌。认真而不执着，效率反而更高。」\n\n再以真俗二谛对比收束：「俗谛——您要工作、要赚钱、要养家，因果宛然有，这些都不能否认。真谛——但您不要把工作、金钱当成永恒不变的来抓，它们随时会变。色即是空，空即是色——努力工作和不执着结果，是一体两面，不矛盾。」\n\n最后点睛：「所以佛法不是让你躺平，是让你'尽力而为，随缘而安'。该奋斗奋斗，该放下放下。这才是空的真实义。」"}, {"num": 5, "title": "病患者问「为什么是我」", "tags": ["现身说法", "譬喻", "对治"], "audience": "中年男性，刚确诊癌症，愤怒不平</p>", "situation": "患者说：「我一辈子没做坏事，为什么得癌症？那些坏人活得好好的。」</p>", "method": "现身说法（印光大师「我亦薄地凡夫」）+ 譬喻（业力如暗流）</p>", "dharma": "因果通三世，病苦可能是宿业现前，但也正是修行的契机——转病为道。</p>", "analysis": "法师先不谈因果理论，坐在患者身旁，目光平视：「我先不跟你讲大道理。得了这个病，换谁都會觉得不公平。你的感受，我理解。」\n\n停顿几秒，让共情到位。然后慢慢说：「印光大师——净土宗第十三代祖师，一生修行精进，晚年也生病。他怎么说自己的？他说'我亦薄地凡夫'——我也是个凡夫，也有业报。连大师都不回避生病这件事。所以生病不代表你做错了什么，业力如地下暗流，我们看不到它何时涌出。」\n\n引入譬喻：「病就像一个提前通知——佛给你的提前通知。一般人突然走了，什么都没准备。你现在还有时间，这是佛给你的机会，让你提前做好准备。」\n\n引导修行方向：「你可以把病当作修行的催化剂。每天花十分钟念佛，念的时候想：如果我好了，我要好好利益他人；如果我走了，我求生净土。生死都交给阿弥陀佛，你自己不用扛。」\n\n最后：「你现在最该做的不是追问'为什么是我'，而是想'我接下来怎么用这段时间'。把愤怒转化为精进，这是病给你的礼物。」"}, {"num": 6, "title": "小学生参观寺院问「佛是真的吗」", "tags": ["图像", "举例", "童稚"], "audience": "10岁小学生，学校组织参观寺院</p>", "situation": "小学生仰头看大佛，天真地问：「这个佛是真的吗？他活着吗？」</p>", "method": "图像（以像表法）+ 举例（生活中的比喻）</p>", "dharma": "佛像不是「神」，是「老师」——佛是觉悟的人，像是为了纪念和学习的方便。</p>", "analysis": "法师蹲下来，与孩子平视，笑着说：「你问得真好！这个问题很多大人都不敢问呢。」\n\n指着佛像，用孩子能懂的语言讲：「这尊佛像，就像你们教室墙上贴的孔子像。孔子爷爷已经不在了，对不对？但你们看到他的像，就知道要好好学习。佛像也一样——佛是一个特别了不起的老师，他教我们怎么做一个好人、怎么不生气、怎么帮助别人。我们看到佛像，就想起他教的这些道理。」\n\n停一下，问孩子：「你们班有没有特别聪明的同学？大家会去问他怎么学习，对不对？佛就是那个'最聪明的同学'，他把学习的好方法告诉了所有人。我们拜佛，不是在拜木头，是在说：'老师，我想跟你学。'就像你对你们班学霸说'教教我'一样。」\n\n最后：「所以佛像不是'活的'，但佛教的道理是活的。你记住一条就够了——做好事、不说谎、不欺负人，这就是在跟佛学了。好不好？」"}, {"num": 7, "title": "企业家问「做生意能学佛吗」", "tags": ["举例", "问答", "居士"], "audience": "成功企业家，担心佛教与商业冲突</p>", "situation": "企业家问：「做生意难免要谈判、要竞争，甚至要『套路』，这和佛教戒妄语、不偷盗矛盾吗？」</p>", "method": "举例（维摩诘居士）+ 问答</p>", "dharma": "佛法在世间——居士在世间行菩萨道，以正业正命为修行，不以离世间为佛法。</p>", "analysis": "法师不否定他的疑虑，先肯定：「您能想到这个问题，说明您对修行是认真的。做生意和学佛确实有张力，但不是对立的。」\n\n引维摩诘的例子：「佛教有一位大居士叫维摩诘，他是在家人，财富无量，生意做得很大。但佛经说他'虽处居家不着三界'——身在商场，心不被绑住。他做生意，但不用欺骗手段；他赚钱，但把钱用来利益众生。这是在家菩萨的典范。」\n\n解决具体困惑：「您说谈判难免要'套路'——其实好的谈判不是骗对方，而是找到双赢的方案。你让一步，对方让一步，双方都能接受，这就是'自利利他'。正业正命——正当的生意、公平的竞争，本身就是修行。」\n\n引《六祖坛经》收束：「六祖说'佛法在世间，不离世间觉'。您把企业管理好，员工工资按时发，产品对得起客户，依法纳税——这些本身就是菩萨行。不用离开生意场去修行，生意场就是您的道场。念佛可以早晚各十分钟，关键不在时间长短，在心有没有归向佛。」\n\n最后：「藕益大师说过，持戒不是不做事，是做正当事。您用佛法的智慧做生意，反而会比别人做得更长远。」"}, {"num": 8, "title": "抑郁症患者想出家逃避", "tags": ["问答", "对比", "对治"], "audience": "30岁女性，重度抑郁，想出家「逃避一切」</p>", "situation": "她说：「我太痛苦了，世间什么都没意思，我想出家，躲进寺庙里。」</p>", "method": "问答（破执显正）+ 对比（出世 vs 逃避）</p>", "dharma": "出家是「面对」不是「逃避」——如果心不转，换环境没用。</p>", "analysis": "法师不直接拒绝，也不鼓励，先问一个问题：「您觉得寺庙里就没有烦恼了吗？」\n\n等她回答后，继续：「寺庙里也有人情冷暖，也有事务纷争。出家人有出家的功课，不是换个地方就什么烦恼都没了。如果您的心没有转变，换了环境，烦恼会跟着您走。」\n\n以譬喻说明：「生病了要吃药。您不能说'换个房间病就好了'——病在身上，不在房间。您的痛苦在心里，不在世间。心不转，去到哪里都一样。」\n\n对比出世与逃避：「出世不是身体跑掉，是心超越。佛陀出家，是已经看透了、放下了才出家的，不是逃避。您现在的状态是逃避——想躲开痛苦。但痛苦不会因为您躲就消失。」\n\n给具体建议：「我建议您先做三件事：第一，配合医生治疗，把病治好；第二，每天念佛十分钟，调伏内心的痛苦；第三，等您心定了、不逃避了，再考虑出家的事。到时候如果您还想去，我支持您。但现在，先治心。」"}, {"num": 9, "title": "外国人问「佛教为什么拜偶像」", "tags": ["图像", "问答", "初机"], "audience": "外国访客，基督教背景，对佛教拜像不解</p>", "situation": "外国访客问：「你们为什么拜雕像？这不是偶像崇拜吗？」</p>", "method": "图像（以像表法）+ 问答</p>", "dharma": "佛像非偶像，是「法之载体」——拜像不是拜木头，是借像忆念佛的教导。</p>", "analysis": "法师不辩驳，用对方能理解的方式解释：「您有照片吗？出门时带家人的照片？」\n\n等对方点头后继续：「您想念家人时，看看照片——您不是在拜那张纸，是在忆念照片背后的人。佛像就是这个道理。佛已经不在了，但我们看到佛像，就想起佛的教导。拜佛像不是拜木头石头，是借这个形象收心、忆念佛法。」\n\n引《金刚经》：「佛自己都说过：'若以色见我，以音声求我，是人行邪道，不能见如来。'——佛明确说不要执着于形相。所以拜像只是方便手段，不是目的。」\n\n进一步解释：「天主教也有圣像、十字架，看到十字架就想到耶稣的牺牲。佛教的佛像也是同理——看到佛的慈悲相，提醒自己也要慈悲；看到佛的禅定相，提醒自己也要修定。这是一种教育方式，不是偶像崇拜。」\n\n最后：「当然，如果有人执着到认为'佛像就是佛'，那确实就是偶像崇拜了——但这不是佛教的教义，是个人理解偏差。正信的佛教，像是工具，法才是根本。」"}, {"num": 10, "title": "夫妻吵架来寺院评理", "tags": ["譬喻", "举例", "居士"], "audience": "中年夫妻，当众在法师面前互相指责</p>", "situation": "妻子：「他整天打麻将不管家！」丈夫：「她唠叨个没完！」两人请法师评理。</p>", "method": "譬喻（镜子）+ 举例 + 反问</p>", "dharma": "各自反省自己的「因」，不执着对方的「过」——修行从自己开始。</p>", "analysis": "法师不判谁对谁错，让两人先坐下，各倒一杯茶。\n\n等两人安静后，以譬喻引导：「你们看佛龛旁边那面镜子——镜子照到丑的人，不是镜子的错；照到美的人，镜子也不会变美。你们看对方的问题，其实对方也是你的镜子——你从他身上照出了自己的习气。」\n\n转向丈夫：「您说太太唠叨。她为什么唠叨？是不是您有些事没做到位，她才反复说？如果您主动做好了，她还有唠叨的理由吗？」再转向妻子：「您说他打麻将不管家。您唠叨能让他不打吗？越唠叨他越烦，越烦越去打。换个方式——他回来时你不说他，给他倒杯茶，看看他什么反应。」\n\n以反问收束：「你们都改变不了对方。但你们能改变自己吗？从今天起，做一个实验：一个月内，他不打麻将、她不唠叨。先从自己做起——您能不能一个月不唠叨？您能不能一个月不打麻将？谁先做到，谁就是修行人。」\n\n最后：「夫妻之道就是修行道。不用来寺院评理，回家各自改自己。一个月后如果还有问题，再来找我。」"}, {"num": 11, "title": "临终者问「死后去哪里」", "tags": ["故事", "唱诵", "临终"], "audience": "80岁老人，病危，恐惧死亡</p>", "situation": "老人拉着法师的手：「我快走了，死后到底去哪里？我害怕。」</p>", "method": "故事（净土经典）+ 唱诵（称名念佛）+ 现身说法</p>", "dharma": "信愿念佛，求生净土——临终一念归佛，即蒙佛接引。</p>", "analysis": "法师坐在老人床边，握着他的手，不急不缓地说：「老人家，您不用怕。我跟您说说，死后去哪里。」\n\n讲净土：「佛在《阿弥陀经》里说，有一个世界叫极乐净土，那里没有病痛、没有衰老、没有恐惧。阿弥陀佛发过愿：只要有人真心念他的名号，愿意去他的净土，临终时阿弥陀佛就会来接引您。就像搬家——从这间又老又破的房子，搬到一间金碧辉煌的新房子。」\n\n教念佛：「您现在跟着我念——南无阿弥陀佛。不用念多，就这六个字。念的时候想着阿弥陀佛就在您面前，金光照着您。您念一声，佛就离您近一步。」\n\n开始轻声领念：「南无阿弥陀佛……南无阿弥陀佛……」语速缓慢，配合老人的呼吸节奏，念约三五分钟。\n\n然后说：「您从现在起，心里就念这六个字。想到害怕了就念，想到家人了也念。把所有念头都换成这一句佛号。阿弥陀佛一定会来接您。很多老修行走的时候都很安详，因为他们知道去哪里。您也知道去哪里了——去极乐净土。不用怕。」\n\n最后对家属说：「你们在旁边也跟着念，声音轻一点，不要哭。你们念佛就是帮他。一直念到他断气之后八小时，不要动他的身体。」"}, {"num": 12, "title": "大学生问「佛教怎么看AI」", "tags": ["问答", "举例", "年轻人"], "audience": "计算机系大学生，对AI与佛教的关系好奇</p>", "situation": "学生问：「AI越来越聪明，将来会不会成佛？佛教怎么看AI？」</p>", "method": "问答 + 举例</p>", "dharma": "佛性的关键不在「智能」而在「觉性」——AI有智能无觉性，不能成佛，但可作为修行的助缘。</p>", "analysis": "法师分层回答，不否定AI的价值，但厘清界限：「这个问题很好，分两层说。」\n\n第一层：「从佛教唯识看，人有八识——眼耳鼻舌身意，加上末那识和阿赖耶识。AI有'智能'，但没有八识。它没有阿赖耶识（含藏种子的深层意识），没有末那识（执着的根源），所以它没有烦恼可转，也没有觉性可开。AI是工具，属于'器世间'，不是'有情众生'。佛性是在有情众生的觉性上说的，AI没有这个基础。」\n\n第二层：「但这不意味着AI跟佛教无关。AI可以是'方便'——用AI传播佛法、辅助学经、翻译经典，这是法布施的新载体。就像印刷术发明后，佛经可以大量印制传播，AI是这个时代的'印刷术'。」\n\n用比喻收束：「AI就像一本会说话的经书。经书自己不会成佛，但能帮人成佛。AI的智能再高，它还是在'所知'的层面运作，没有'能知'的觉性。智能和觉性是两回事——智能是处理信息的能力，觉性是知道自己存在的那个'知'。AI有前者无后者。」\n\n最后：「所以不用担心AI成佛。但如果AI能帮你们更好地学佛，那是好事。技术是中性的，看怎么用。」"}, {"num": 13, "title": "穷人问「没钱怎么布施」", "tags": ["举例", "故事", "对治"], "audience": "清洁工阿姨，收入微薄，想布施但力不从心</p>", "situation": "阿姨说：「法师，我也想布施积福，但工资那么低，拿不出钱。」</p>", "method": "举例（七种不花钱的布施）+ 故事（贫女一灯）</p>", "dharma": "布施不在钱多钱少，在心——「心施」比「财施」更广。</p>", "analysis": "法师笑着摇头：「谁说布施一定要花钱？《阿含经》里佛说了七种不花钱的布施。」\n\n逐一讲：「第一，眼施——用慈祥的眼光看人，不用嫌弃的眼神。您打扫走廊时，跟每个路过的人善意地对视一下，这就是布施。第二，面施——对人微笑。您见到邻居笑一笑，别人一天心情都好。第三，言施——说好话、说鼓励人的话。第四，身施——帮人做事。您把走廊打扫干净，让所有人有干净的环境走，这就是身施。第五，心施——真心关心别人。第六，床座施——在公交上让座。第七，房舍施——给路人指路、提供方便。」\n\n讲贫女一灯的故事：「佛在世时，有个贫女穷到只有一文钱，她买了一盏油灯供佛。国王供了万盏灯，风吹灭了好多。但贫女那盏灯，神风吹不灭。佛说：贫女的灯，以真诚心点，功德最大。布施不在钱多钱少，在心。」\n\n收束：「您每天打扫走廊就是布施——您让几十个人有干净的环境。您对人微笑就是布施——您给了别人温暖。这些功德，跟捐一万块钱一样大，甚至更大。有钱出钱，有力出力，有心出心。您的心比金子还珍贵。」"}, {"num": 14, "title": "科学家问「空性是否等于虚无」", "tags": ["对比", "问答", "知识分子"], "audience": "物理学博士，把「空」理解为「什么都没有」</p>", "situation": "博士问：「佛教说『色即是空』，是不是说物质不存在？这跟物理学的观测矛盾。」</p>", "method": "对比（真俗二谛）+ 问答</p>", "dharma": "「空」不是「无」，是「无自性」——事物存在，但没有固定不变的本质。</p>", "analysis": "法师用物理学类比来回答，不说抽象哲学：「博士，您研究物理，我用量子力学来类比。」\n\n「量子力学说，微观层面物质是'概率波'，不是确定的实体。观测之前，粒子没有确定的位置——这跟佛教说的'空'很像。空不是说桌子不存在，是说桌子没有固定不变的自性。它是因缘和合的——木材、钉子、胶水、工匠，凑在一起才叫'桌子'。哪天拆了，桌子就不存在了。所以桌子'有'（现象层面），但桌子'空'（没有固定本质）。」\n\n以真俗二谛对比收束：「俗谛——桌子宛然有，你能看到、能摸到、能放东西。真谛——桌子无自性，它在变、终将坏灭。中道是'色即是空，空即是色'——有和无是一体两面。物质存在，但没有永恒不变的本质。这不跟你们的观测吻合吗？物质在宏观层面'有'，在微观层面'不确定'。」\n\n最后：「所以佛法说的空，跟物理学不矛盾。空不是虚无主义，是对'固定本质'的否定。现象有，本质空——这就是缘起性空。」"}, {"num": 15, "title": " grieving家属问「亡亲在哪里」", "tags": ["故事", "譬喻", "临终"], "audience": "家属刚失去母亲，问法师「妈妈现在在哪里」</p>", "situation": "女儿哭着问：「妈妈走了三天了，她现在在哪里？她还好吗？」</p>", "method": "故事（中阴身教法）+ 譬喻（换衣服）</p>", "dharma": "亡者在中阴阶段（最多49天），随业力转生——家属为其做功德可助其往生善道。</p>", "analysis": "法师语气柔和，不回避问题：「您妈妈走了三天，您想知道她在哪里，我告诉您。」\n\n讲中阴身：「人死后到下一世投生之间，有一段中间状态，叫'中阴身'，最长四十九天。就像换衣服——脱了旧衣服（身体），还没穿上新衣服（下一世身体），中间有一段'换衣时间'。这段时间她的心还在，她能看到家人、能感知到你们的思念。」\n\n给具体建议：「在这四十九天里，您能为妈妈做几件事：第一，每天念一卷《地藏经》回向给她——地藏菩萨发过愿，要度尽地狱众生，念他的经功德很大。第二，去寺院为她供灯、供斋，以三宝之力回向。第三，行善——捐钱给需要的人、放生、帮助别人，把功德回向给她。这些她都能收到。」\n\n讲目连救母：「佛的大弟子目连，证了阿罗汉，用神通看到亡母在饿鬼道。他一个人的力量救不了——最后靠七月十五供养十方僧众的功德，才把母亲度脱。所以个人的力量有限，要借三宝和僧众的力量。」\n\n最后：「您不用太担心。这四十九天是最关键的，您为她做的每一件善事、念的每一卷经，都在帮她。等四十九天过了，她就会随业力转生。您现在把悲伤转化为行动——这是真正能帮到妈妈的方式。」"}, {"num": 16, "title": "戒毒青年问「罪业能消吗」", "tags": ["现身说法", "故事", "对治"], "audience": "28岁男性，戒毒中，深感自责</p>", "situation": "青年低着头说：「我以前吸毒、偷东西、害了很多人，这些罪业能消吗？我还有救吗？」</p>", "method": "现身说法（莲花出淤泥）+ 故事（央掘魔罗）</p>", "dharma": "罪业性空——真心忏悔、改过修行，罪业可消。放下屠刀，立地成佛。</p>", "analysis": "法师注视青年的眼睛，语气坚定但不严厉：「你问我你还有没有救？我告诉你——有。」\n\n讲央掘魔罗的故事：「佛在世时有个人叫央掘魔罗，他受了外道蛊惑，以为杀人能得解脱。他杀了九百九十九个人，还要杀母亲凑一千。佛出现在他面前，他追佛追不上，佛回头说：'我已经停下了，你还没有停下。'他一听就悟了，放下屠刀跟佛出家，后来证了阿罗汉。连杀了九百九十九人的人都能解脱，你过去做的事，跟这比起来呢？」\n\n引入譬喻：「莲花从淤泥里长出来——淤泥越脏，莲花越大。你的过去就是淤泥，但你从淤泥里站起来，反而比一直在顺境中的人更有力量。因为你真知道苦，你的出离心是真的。」\n\n讲忏悔的正确方法：「忏悔不是天天自责、觉得自己是坏人。忏悔是：承认做错了，后不再做，然后积极行善弥补。罪业本性是空的——'罪从心起将心忏'，心一转，业就转。你现在戒毒、来寺院求改过，这个心一念生起，旧业就开始消了。」\n\n最后给方向：「从今天起，每天做三件事：念佛一千声消业，做一件善事积福，晚上反省今天有没有起恶念。坚持下去，你的人生会完全不同。你信不信？」"}, {"num": 17, "title": "家庭主妇问「带娃也能修行吗」", "tags": ["举例", "问答", "居士"], "audience": "全职妈妈，两个孩子，没时间打坐念佛</p>", "situation": "妈妈说：「我也想修行，但一天到晚带孩子做饭，根本没时间打坐念佛。」</p>", "method": "举例（生活中的禅）+ 问答</p>", "dharma": "修行不在形式——做事时心清明、不抱怨，就是修行。生活即是道场。</p>", "analysis": "法师不否定她的困扰，先理解：「带孩子确实辛苦，一天下来连喘口气的时间都没有，更别说打坐念佛了。」\n\n转换观念：「但修行不在形式——不是非要盘腿打坐、念满一万声佛号才算修行。六祖惠能说过，'搬柴运水皆是禅'。您做的事情本身就是修行，关键是您做的时候心是什么状态。」\n\n逐一举例：「您切菜的时候，好好切，不想别的——手在切、眼在看、心专注在刀和菜上。这就是修定。孩子哭闹时，您不发脾气、不烦躁，耐心哄——这就是修忍辱。做饭时想：'愿吃过这饭的家人都健康'——这就是布施。洗碗时想：'洗去碗上的油污，也洗去心上的烦恼'——这就是修行。」\n\n收束：「您不需要另外找时间修行。您把每天在做的事，加上一个'觉知'——做的时候知道自己在做什么、心不跑——家务就变成了修行。家庭就是您的道场，孩子就是您的善知识。做饭、洗衣、带孩子，件件都是波罗蜜。」\n\n最后：「每天睡前花三分钟，回顾今天：有没有发脾气？有没有对孩子失去耐心？有就忏悔，没有就随喜。三分钟就够了。这也是修行。」"}, {"num": 18, "title": "退休干部问「佛教与党的政策矛盾吗」", "tags": ["问答", "举例", "初机"], "audience": "退休老干部，担心信佛与政治立场冲突</p>", "situation": "老干部问：「我是党员，信佛会不会和党的政策矛盾？佛教教人消极，对国家建设不利吧？」</p>", "method": "问答 + 举例</p>", "dharma": "佛教「庄严国土、利乐有情」与建设社会不矛盾——佛教徒做好公民、贡献社会，即庄严国土。</p>", "analysis": "法师不回避政治话题，正面回应：「这个问题很多老同志问过。佛教和党的政策不矛盾，我从几个层面说。」\n\n第一层面：「佛教讲'报四重恩'——报父母恩、报众生恩、报国土恩、报三宝恩。'报国土恩'就是爱国。佛教不反政府、不反社会，要求信徒做好公民。」\n\n第二层面：「佛教五戒——不杀、不盗、不淫、不妄、不酒。这跟法律和道德完全一致。不杀=不害人，不盗=不贪污，不妄=不造假，这跟党员的要求有什么矛盾？」\n\n第三层面举例：「抗战时期，虚云老和尚带头赈灾救民。太虚大师倡'人生佛教'，号召佛教徒积极参与社会建设。佛教徒在社会上做好本职工作、服务群众，这就是'庄严国土'——建设美好社会。」\n\n收束：「佛教教人'消极'是误解。佛教说的是不执着，不是不做事。相反，菩萨道要求'不入涅槃、还入生死'——主动入世利益众生。您作为党员，把工作做好、把群众服务好、不贪不占——这就是在行菩萨道。信佛让您成为更好的党员，不是让您逃避党员的责任。」"}, {"num": 19, "title": "职场白领问「同事使坏怎么办」", "tags": ["譬喻", "举例", "对治"], "audience": "30岁白领，被同事背刺，愤怒想报复</p>", "situation": "白领说：「同事在领导面前说我坏话，害我被批。我气死了，想报复他，佛教说不嗔，那我怎么办？」</p>", "method": "譬喻（炭火）+ 举例 + 对治（慈悲观）</p>", "dharma": "嗔火自灼——报复伤害的是自己的心。以慈悲观转嗔为悲。</p>", "analysis": "法师不急于说教，先让他把愤怒说完。然后平静地问：「你报复了他，然后呢？」\n\n等他愣住后继续：「你报复他，他再报复你，循环到什么时候？而且你手握热炭想扔别人——先烫的是你自己。你的愤怒伤害的不是他，是你自己。你气得睡不着，他可能睡得很好。」\n\n引入慈悲观的对治法：「佛教有个方法叫慈悲观。不是让你原谅他——你没义务原谅。是让你换一个角度看他：他使坏，是因为他有自己的烦恼、自己的恐惧、自己的不安全感。一个内心安定的人，不需要去踩别人。他就像一个病人——生病的人。你不用跟他一般见识。」\n\n给具体建议：「你现在做两件事：第一，不要以牙还牙。不是为他，是为你自己——不让自己变成跟他一样的人。第二，把精力放在让自己更优秀上。用成绩说话，让领导看到你的能力。最好的'报复'是让他看到你过得比他好。」\n\n收束：「嗔火自灼。你把愤怒转化为精进——他的恶意反而成了你前进的燃料。这是最好的处理方式。佛说的不嗔，不是让你忍气吞声，是让你把那股能量用在对的地方。」"}, {"num": 20, "title": "老修行执着「境界」", "tags": ["反问", "对比", "对治"], "audience": "修行多年的居士，执着打坐时的「光感」体验</p>", "situation": "居士兴奋地说：「法师，我打坐时看到光了！是不是快开悟了？」</p>", "method": "反问 + 对比（真悟与光影）</p>", "dharma": "境界如幻——执着境界即魔境。真悟无相，不执着任何体验。</p>", "analysis": "法师不鼓励也不否定，平静地问：「你打坐时看到光，我想问你——看到光的是谁？」\n\n等他思考后继续：「你说'我看到光了'——那个'我'是谁？光是你看到的对象，但能看光的那个'心'是什么？你去参这个。」\n\n对比真悟与光影：「禅宗说'光影门头'——打坐时看到光、看到佛、看到各种境界，这些都是意识活动，不是开悟。真正的开悟是'桶底脱落'——你所有概念、所有抓取，一下子全碎了。不是'看到什么'，是'看破了什么'。」\n\n引《楞严经》：「佛在《楞严经》里专门讲了五十种阴魔——修行中会看到各种光、各种境界，佛说这些全是色阴区域的现象，不是成就。执着了就是魔境，不执着就继续用功。」\n\n给具体指导：「好的境界不如没有境界。你看到光了，怎么办？不追、不拒、不告诉别人、不沾沾自喜。继续用你的功——参你的话头，或者念你的佛。光来了不追，光走了不留。用功如常，跟没看到光一样。」\n\n最后：「如果境界越来越强、影响到正常生活，就停下来，不要硬坐。去做点体力劳动，散散步。修行是长远的事，不急在一时。」"}, {"num": 21, "title": "新皈依者问「该修哪个宗派」", "tags": ["对比", "问答", "初机"], "audience": "刚皈依的居士，面对各宗派不知选哪个</p>", "situation": "新居士问：「禅、净、天台、华严、唯识……我该修哪个？哪个最好？」</p>", "method": "对比（五宗派各有方便）+ 问答</p>", "dharma": "法无高下，契机为要——选与自己根器最相应的，一门深入。</p>", "analysis": "法师不急于推荐某个宗派，先了解情况：「你先告诉我，你平时怎么学的佛？你看什么经？你打坐还是念佛？你觉得自己是什么性格？」\n\n听他回答后，以譬喻引导：「各宗派就像不同的药——治不同的病。没有'最好'的药，只有'最对症'的药。你是什么病，就吃什么药。」\n\n逐一对比：「你喜欢直接参究'我是谁'这种问题，逻辑强、根器利——可以学禅宗，参话头。你喜欢简单、求稳当、不想太复杂——净土宗，念佛求生极乐，谁都能念。你喜欢系统、爱思辨、想把理论搞清楚——天台宗，学五重玄义、一心三观。你境界宏阔、重圆融、想理解'一即一切'——华严宗。你喜欢分析、爱逻辑、想搞懂心识运作——唯识宗。」\n\n给建议：「你先各了解一点——每个宗派花一周时间读读入门书。然后选跟你最相应的，一门深入。不要朝三暮四，今天禅明天净后天唯识——那样哪个都学不好。」\n\n收束：「佛说八万四千法门，为治八万四千烦恼。法门无高下，契机就是最好的。你选了一个就坚持下去，像打井一样——在一个地方一直打，总能出水。到处换地方，永远打不出水。」"}, {"num": 22, "title": "僧人问「讲经没人听怎么办」", "tags": ["问答", "举例", "法师"], "audience": "年轻法师，讲经听众越来越少，受挫</p>", "situation": "年轻法师沮丧地说：「我认真备课讲经，但听众越来越少，是我讲得不好吗？」</p>", "method": "问答 + 举例（善导大师）</p>", "dharma": "观机逗教——不是法不好，是契机不够。先让观众欢喜（世界悉檀），再导入正法。</p>", "analysis": "法师不安慰他，直接问核心问题：「你讲经时，是讲你想讲的，还是听众需要听的？」\n\n等他思考后继续：「你认真备课，讲的都是教理名相——但听众是谁？老奶奶听不懂'一念三千'，年轻人觉得'十二因缘'跟他没关系。你讲得再好，他们听不进去，等于没讲。」\n\n举例善导大师：「善导大师每念一声佛，口中就出一道光明。他没有讲长篇大论——他念佛，大众看到光，自己就信了。不是让你也现神通，是学他的善巧——用听众能接受的方式讲。」\n\n给具体建议：「你下次讲经前，先做三件事：第一，了解听众是谁——是居士还是出家人？年纪大还是年轻？文化程度如何？第二，用他们听得懂的语言讲——少用术语，多用生活例子。第三，先讲他们关心的问题——怎么处理烦恼、怎么面对生病、怎么教育孩子——把佛法跟他们的生活挂钩。」\n\n收束：「佛法有句话叫'契理契机'——道理要对（契理），方法要合听众的机（契机）。你备课很认真，契理没问题。现在要补的是契机。先让观众欢喜（世界悉檀），再渐入正法。法再好，听众听不进去等于没讲。」"}, {"num": 23, "title": "失恋青年来寺院散心", "tags": ["譬喻", "现身说法", "年轻人"], "audience": "22岁大学生，刚被分手，心灰意冷</p>", "situation": "青年在寺院长椅上发呆，法师路过，他说：「师父，我被甩了，活着没意思。」</p>", "method": "譬喻（梦、泡）+ 现身说法</p>", "dharma": "无常——得失皆是因缘聚散。痛苦来自执着，非来自失去本身。</p>", "analysis": "法师不急于说教，在长椅旁坐下，安静片刻后轻声说：「被甩的感觉，像天塌了一样。我理解。」\n\n听他倾诉片刻，然后慢慢说：「你觉得'活着没意思'——但这个'没意思'不是真的没意思，是你太痛了，痛到想逃避。你 不是不想活，是不想这么痛。」\n\n引入譬喻：「感情就像手握沙子。你攥得越紧，流失越快。不是你不好，是因缘变了。因缘和合则聚，因缘消散则灭——这不是你的错，也不是她的错，是因缘如此。《金刚经》说'一切有为法，如梦幻泡影'——不是说感情是假的，是说它如梦一样，因缘和合而生、因缘散而灭。梦是真的痛，但梦终究会醒。」\n\n现身说法：「我年轻时也有过类似经历。当时觉得天塌了，什么都完了。后来学佛才知道——那次失去反而让我走上了修行路。你现在觉得痛，但十年后回头看，这可能是一个转折点。」\n\n给方向：「你现在不用想'以后怎么办'。先做一件事——每天来寺院走走，或者在家念十分钟'观世音菩萨'。观音菩萨是救苦救难的，你心里苦，就念他的名号。不用理解什么道理，就是念。念久了，心会慢慢安下来。心安了，你就知道下一步怎么走了。」"}, {"num": 24, "title": "富商问「布施有没有功德」", "tags": ["反问", "故事", "对治"], "audience": "富商，以「布施求福报」心态大量捐款</p>", "situation": "富商骄傲地说：「法师，我给寺庙捐了一百万，功德很大吧？」</p>", "method": "反问 + 故事（达摩与梁武帝）</p>", "dharma": "着相布施，福报有限；三轮体空，功德无量。</p>", "analysis": "法师不奉承，直接讲达摩与梁武帝的公案：「您说捐了一百万，我给您讲个故事。」\n\n「梁武帝问达摩祖师：'我造寺度僧，布施无数，有什么功德？'达摩说：'实无功德。'梁武帝很不高兴。达摩为什么这么说？——因为梁武帝心里想的是'我捐了''我有功德'，这一执着，功德就变成了有漏的福报——像银行存款，用完就没了。真功德是'三轮体空'——施者（您）、受者（寺庙）、施物（钱），三轮都不可得，不着相布施，功德才无量。」\n\n反问引导：「您捐款时，心里想的是'我捐了'吗？如果是，那就是着相。着相布施得的是福报——下辈子有钱、有地位。但福报用完就没了，不解脱。不着相布施得的是功德——直接趣向解脱。」\n\n收束：「您捐一百万，如果心不着相——'我捐了，但不执着我在捐、不执着捐了多少、不求回报'——功德无量。如果心里想'我捐了很多，佛要保佑我'——那就是有漏福报，不是真功德。」\n\n最后：「布施最好的心态是：捐了就忘了。像左手给右手，自然得很，不觉得自己在'做善事'。这才是无相布施。」"}, {"num": 25, "title": "老奶奶执着「吃素」与家人冲突", "tags": ["举例", "问答", "居士"], "audience": "老奶奶严格吃素，家人不满，家庭矛盾加剧</p>", "situation": "老奶奶抱怨：「我吃素他们都不理解，还故意在我面前吃肉。我气死了！」</p>", "method": "举例 + 问答</p>", "dharma": "吃素是个人修行，不应成为家人的负担——以和为贵，以身作则而非以法压人。</p>", "analysis": "法师不直接评判对错，先反问：「您吃素是为了修行，还是为了证明自己比家人清净？」\n\n等她愣住后继续：「如果是后者，那吃素反而成了'法执'——用佛法来标榜自己、要求别人。这不是修行，是我慢。」\n\n讲六祖的例子：「六祖惠能在猎人队里待了十五年。猎人吃肉，他就吃肉边菜——不是说吃素不对，是说不执着形式。他是开悟的人，在肉锅旁边也能修行。您在家吃素，不要变成家人的负担，不要让他们觉得'你学佛了就跟我们不一样了'。」\n\n给具体建议：「您吃素，默默吃就好。不在家人面前强调'我要吃素你们得配合我'。家人吃肉，您不批评、不皱眉。做饭时给他们做荤菜，自己吃素的。他们问起，简单说'我学佛想吃素'，不多解释、不争辩。」\n\n收束：「家人看到您吃素后身体好、脾气好、不唠叨了，他们自然尊重，甚至跟着吃。修行是感化，不是要求。您用吃素来'要求'家人，他们反感；您用吃素来'感化'家人，他们佩服。哪条路好，您自己选。」"}, {"num": 26, "title": "临终助念时家属争吵", "tags": ["唱诵", "譬喻", "临终"], "audience": "老人临终，子女为遗产争吵，影响助念</p>", "situation": "老人刚断气，子女在病房外为房产争吵，助念的居士很为难。</p>", "method": "唱诵（大声念佛摄众）+ 譬喻（最后一条路）</p>", "dharma": "临终是最关键时刻——亡者的心识最易受干扰。家属争吵会令亡者起嗔心，堕恶道。</p>", "analysis": "法师果断行动：先大声领众念佛，以音声盖过争吵声。「南无阿弥陀佛——」声音沉稳有力，持续三分钟，让病房重新安静。\n\n然后召集所有家属到走廊，语气严肃但平和：「你们父亲正在走人生最重要的一段路。你们现在吵的每一句话，他都能听到。临终的人心识特别敏感，你们一吵，他起嗔心——嗔心一起，直堕恶道。你们是想让他走好，还是想让他因为你们吵架而堕下去？」\n\n以譬喻说明：「就像送人上火车。你们在月台上吵架，车上的人能安心吗？他走这条路，是最关键的时刻。房产的事，等丧事办完再说。现在最重要的事——陪他最后一程。」\n\n给具体安排：「你们现在分两班，每班两小时，轮流在他身边念佛。念'南无阿弥陀佛'，声音轻一点，不要哭。念的时候心里想：'爸爸（妈妈），您跟着佛走，不要牵挂我们。'一直念到他断气后八小时。这是你们能为他做的最后一件事——也是最有用的事。」\n\n最后：「财产是身外之物，你们以后再分。但现在这一刻，过去了就没了。你们孝顺还是不孝顺，就看你现在怎么做。」"}, {"num": 27, "title": "居士问「可以吃肉吗」", "tags": ["问答", "引经", "居士"], "audience": "初学佛的居士，对吃肉与学佛的关系困惑</p>", "situation": "居士问：「法师，学佛必须吃素吗？我工作应酬多，很难不吃肉。」</p>", "method": "问答 + 引经</p>", "dharma": "汉传佛教提倡吃素，但居士可循序渐进——关键是惭愧心与三净肉。</p>", "analysis": "法师不强制，分层回答：「学佛不等于必须吃素，但鼓励吃素。我分几层说。」\n\n第一层：「出家人必须吃素——这是戒律。但居士不强制，可以循序渐进。佛在世时，僧团也吃三净肉——不见杀、不闻杀、不为我杀。所以您现在应酬多，吃三净肉是可以的，不算犯戒。」\n\n第二层引经：「但佛在《楞伽经》《涅槃经》里呵斥吃肉——'一切肉者，无不得命根而有死者'。就是说，所有肉背后都有一条命。佛彻底禁止吃肉，是从慈悲心出发——你吃它的肉，跟它结恶缘，怎么生慈悲？」\n\n第三层给路径：「您不用一下子全断。循序渐进：先从初一、十五吃素开始，一个月两天。习惯了，再加到每周一天。再习惯了，自然就不想吃了。很多居士都是这样慢慢来的。」\n\n收束关键：「关键在心。您现在吃肉时，有惭愧心——'我还不行，但我发愿将来能断'——这份惭愧心本身就是修行。不用自责，不用焦虑。学佛是长远的事，一步一步来。应酬时吃肉边菜，或者点几个素菜，不刻意表现'我吃素'，自然就好。」"}, {"num": 28, "title": "癌症晚期患者问「念佛能治好吗」", "tags": ["现身说法", "问答", "临终"], "audience": "50岁女性，癌症晚期，把念佛当「治病手段」</p>", "situation": "患者急切问：「法师，我天天念佛一万声，癌症能好吗？别人说念佛能消业障。」</p>", "method": "现身说法 + 问答（破执显正）</p>", "dharma": "念佛能消业障，但目的不在治病——若念佛只为治病，好了就退心，不好就疑佛。</p>", "analysis": "法师不直接说「能」或「不能」，先破执：「您念佛的目的是什么？如果只为治病，那万一是定业不可转——病没好，您就不信佛了吗？」\n\n破其预设后，现身说法：「我见过念佛病好的，也见过念佛走了的。印光大师——净土宗十三祖——也是在病中走的。念佛能不能消业障？能。但消不消、消多少，取决于三个条件：业的轻重、念佛的诚心、因果的定与不定。有些是定业——必须受的，念佛只能减轻；有些是不定业——念佛可以转。」\n\n教她正确的发愿方式：「您不妨这样发愿：'如果佛要我活着度众生，就让我好。如果佛要我往生净土，就让我走。生死都交给佛，我自己不挑。'这样念佛，无论结果如何，您的心都是安的——好了是佛加持，走了是佛接引。」\n\n引导转念：「您现在把念佛从'治病手段'升级为'修行'——念佛不只为了病好，是为了跟阿弥陀佛相应。病好是佛的安排，病不好也是佛的安排。您只管念，结果交给佛。」\n\n最后：「我给您一个功课：每天念佛一万声，念完回向——'愿生西方净土中，九品莲花为父母'。把方向从'治病'转到'求生净土'。您把生死都交出去了，病还有什么好怕的？」"}, {"num": 29, "title": "年轻僧人想「闭关」", "tags": ["反问", "对比", "法师"], "audience": "年轻僧人，出家三年，想闭关「速证开悟」</p>", "situation": "年轻僧人：「师父，我想闭关三年，好好用功，争取开悟。」</p>", "method": "反问 + 对比（闭关与利他）</p>", "dharma": "闭关须有基础——教理不通、定力不够、菩提心未发，闭关易出偏差。</p>", "analysis": "法师不批准也不拒绝，先反问两个问题：「您闭关想证什么？为谁闭关？」\n\n等他回答后继续：「如果您说'想证开悟'——越求越远。开悟不是'求'来的，是'放下'来的。您带着'我要开悟'的心去闭关，这个'我要'本身就是最大的障碍。」\n\n对比祖师大德：「达摩面壁九年，是在已经有深厚教理基础和实证经验后才做的。六祖开悟后，还在猎人队里保任十五年。闭关不是初学的事——就像发动机没热好就加速，会翻车。」\n\n给三步建议：「您想用功，我建议分三步走：第一步，先把教理学通——《楞严经》《法华经》《六祖坛经》，至少花两年打基础。第二步，先做短期精进——七天、二十天的密集用功，不要一上来就三年。第三步，菩提心发起来——您闭关是为了谁？只为自己开悟，是小乘心；为度众生而闭关，才是大乘心。」\n\n收束：「闭关不是逃避，是加速。但基础不够就加速，不是翻车就是走偏。您现在出家三年，正是打基础的时候。先把功课做扎实，教理通了、定力够了、菩提心发了，再闭关——那时候闭关才真有用。现在先把心安下来，好好学。」"}, {"num": 30, "title": "非佛教徒问「学佛有什么用」", "tags": ["譬喻", "举例", "问答", "初机"], "audience": "路人路过寺院，好奇进来，对佛教完全不了解</p>", "situation": "路人随口问：「你们信佛的，到底图什么？学佛有什么用？」</p>", "method": "譬喻（药方）+ 举例（生活中的应用）</p>", "dharma": "学佛的「用」——减少烦恼、增长智慧、找到生命的方向。</p>", "analysis": "法师用最简语言回答，不传教、不说教：「佛法就是教人怎么少烦恼、怎么活得明白。」\n\n举例说明：「您焦虑了——佛法教'不黏著'，念头来了不跟着跑，焦虑就淡了。您跟人吵架了——佛法教先看自己的心，是不是自己先起了分别。您怕死了——佛法教念佛求生净土，死了有去处，不用怕。」\n\n以譬喻收束：「佛法就像药方。您不生病时觉得没用，生病了才知道珍贵。但学佛最好在没'大病'时就开始——不要等到生死关头才临时抱佛脚。」\n\n留一个开放的入口：「您今天路过进来，就是缘分。不用急着信什么、做什么。回去后如果感兴趣，可以上网搜一部叫《心经》的经，只有两百六十字，三分钟就读完。读完如果觉得有道理，再慢慢了解。佛教不拉人入教，佛门永远敞开，您什么时候想来都行。」\n\n最后笑着说：「今天来了就算结了善缘。下次路过再进来坐坐，喝杯茶。不用带什么，人来就好。」"}]};

// ========== 全局状态 ==========
var currentTab = 'home';
var currentRoute = null;

// ========== 工具函数 ==========
function $(sel, parent){ return (parent||document).querySelector(sel); }
function $$(sel, parent){ return Array.from((parent||document).querySelectorAll(sel)); }
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='class') e.className = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if(children){
    if(typeof children==='string') e.innerHTML = children;
    else if(Array.isArray(children)) children.forEach(function(c){ if(c) e.appendChild(c); });
    else e.appendChild(children);
  }
  return e;
}

// ========== 存储 ==========
var Store = {
  get: function(key, def){
    try{ var v = localStorage.getItem('fashi_'+key); return v? JSON.parse(v) : def; }catch(e){ return def; }
  },
  set: function(key, val){
    try{ localStorage.setItem('fashi_'+key, JSON.stringify(val)); }catch(e){}
  }
};

// ========== 路由 ==========
function navigate(route){
  location.hash = route;
}

// 返回：优先history.back，无历史则回到对应Tab首页
function goBack(){
  var hash = location.hash.slice(1) || '/home';
  var parts = hash.split('/');
  
  // 如果已经是Tab首页，回到首页
  if(['home','method','school','quiz','scene'].indexOf(parts[1]) >= 0 && parts.length === 2){
    navigate('/home');
    return;
  }
  
  // 子页面返回到对应Tab
  if(parts.length >= 3){
    if(parts[1] === 'method' || parts[1] === 'school' || parts[1] === 'quiz' || parts[1] === 'scene'){
      navigate('/' + parts[1]);
      return;
    }
    // chapter路由特殊处理
    if(parts[1] === 'chapter'){
      navigate('/home');
      return;
    }
  }
  
  // 默认尝试history.back
  if(window.history.length > 1){
    window.history.back();
  }else{
    navigate('/home');
  }
}

function handleRoute(){
  var hash = location.hash.slice(1) || '/home';
  var parts = hash.split('/');
  var tab = parts[1] || 'home';
  
  // 切换Tab
  if(['home','method','school','quiz','scene'].indexOf(tab) >= 0){
    switchTab(tab);
  }
  
  // 处理子路由
  if(tab === 'home' && parts.length === 2){
    renderHome();
  } else if(tab === 'method' && parts.length === 2){
    renderMethodList();
  } else if(tab === 'method' && parts.length === 3){
    renderChapter(parts[2]);
  } else if(tab === 'school' && parts.length === 2){
    renderSchoolList();
  } else if(tab === 'school' && parts.length === 3){
    renderChapter(parts[2]);
  } else if(tab === 'quiz' && parts.length === 2){
    renderQuizList();
  } else if(tab === 'quiz' && parts.length === 3){
    renderQuiz(parts[2]);
  } else if(tab === 'scene' && parts.length === 2){
    renderSceneList();
  } else if(tab === 'chapter' && parts.length === 3){
    // 通用章节路由（从首页跳转用）
    renderChapter(parts[2]);
  } else {
    renderHome();
  }
}

function switchTab(tab){
  currentTab = tab;
  $$('.tab-item').forEach(function(t){
    t.classList.toggle('active', t.dataset.tab === tab);
  });
}

// ========== 顶部栏 ==========
function updateHeader(title, showBack){
  var backBtn = $('.header-back');
  var titleEl = $('.header-title');
  titleEl.textContent = title;
  backBtn.style.visibility = showBack ? 'visible' : 'hidden';
}

// ========== 页面渲染 ==========
function getPageContainer(){
  var c = $('#page-container');
  if(!c){
    c = el('div', {id:'page-container'});
    document.body.appendChild(c);
  }
  return c;
}

function clearPage(){
  var c = getPageContainer();
  c.innerHTML = '';
  window.scrollTo(0, 0);
}

        <div class="quick-card-icon">📖</div>
        <div class="quick-card-title">讲法手法</div>

      </div>
      <div class="quick-card" onclick="navigate('/school')">

// ----- 答题（逐题即时反馈） -----
function renderQuiz(quizId){
  var quiz = APP_DATA.quizzes.find(function(q){ return q.id === quizId; });
  if(!quiz){ renderQuizList(); return; }
  
  updateHeader(quiz.title, true);
  clearPage();
  var c = getPageContainer();
  
  // 加载或初始化进度
  var progress = Store.get('quiz_'+quizId, {
    answers: quiz.questions.map(function(){ return null; }),
    completed: false,
    score: 0
  });
  
  var total = quiz.questions.length;
  
  c.innerHTML = '<div class="quiz-container">' +
    '<div class="quiz-header">' +
      '<h2>'+quiz.title+'</h2>' +
      '<div class="quiz-progress-bar"><div class="quiz-progress-fill" id="qprogress" style="width:0%"></div></div>' +
      '<div class="quiz-progress-text" id="qprogresstext">第 1 / '+total+' 题</div>' +
    '</div>' +
    '<div id="quiz-questions"></div>' +
    '<div id="quiz-result-area"></div>' +
  '</div>';
  
  renderQuizQuestions(quiz, progress, quizId);
}

function renderQuizQuestions(quiz, progress, quizId){
  var container = $('#quiz-questions');
  if(!container) return;
  
  container.innerHTML = '';
  var total = quiz.questions.length;
  
  quiz.questions.forEach(function(q, qi){
    var userAnswer = progress.answers[qi];
    var answered = userAnswer !== null;
    
    var card = el('div', {class:'quiz-q-card', id:'qcard-'+qi});
    
    // 题目
    var qText = el('div', {class:'quiz-q-text', html:'<span class="quiz-q-num">'+(qi+1)+'</span>'+q.q});
    card.appendChild(qText);
    
    // 选项
    var optLabels = ['A','B','C','D'];
    q.opts.forEach(function(opt, oi){
      var optEl = el('div', {
        class: 'quiz-opt' + (answered ? ' disabled' : ''),
        html: '<span class="opt-label">'+optLabels[oi]+'</span><span>'+opt+'</span>'
      });
      
      if(answered){
        if(oi === q.correct) optEl.classList.add('correct');
        if(oi === userAnswer && userAnswer !== q.correct) optEl.classList.add('wrong');
      }else{
        optEl.addEventListener('click', function(){
          answerQuestion(quiz, progress, quizId, qi, oi, optEl, card);
        });
      }
      
      card.appendChild(optEl);
    });
    
    // 反馈区（已答时显示）
    if(answered){
      var isCorrect = userAnswer === q.correct;
      var fb = el('div', {
        class: 'quiz-feedback show ' + (isCorrect ? 'correct' : 'wrong'),
        html: '<span class="fb-icon">'+(isCorrect?'✅':'❌')+'</span> <strong>'+(isCorrect?'回答正确！':'回答错误')+'</strong><br>'+q.explain
      });
      card.appendChild(fb);
      
      // 下一题按钮
      if(qi < total - 1){
        var nextBtn = el('button', {
          class:'quiz-next-btn',
          html:'下一题 →'
        });
        nextBtn.addEventListener('click', function(){
          var next = $('#qcard-'+(qi+1));
          if(next){
            next.scrollIntoView({behavior:'smooth', block:'center'});
          }
        });
        card.appendChild(nextBtn);
      }
    }
    
    container.appendChild(card);
  });
  
  // 更新进度条
  updateQuizProgress(quiz, progress);
  
  // 检查是否完成
  var allAnswered = progress.answers.every(function(a){ return a !== null; });
  if(allAnswered && !progress.completed){
    progress.completed = true;
    progress.score = progress.answers.filter(function(a, i){ return a === quiz.questions[i].correct; }).length;
    Store.set('quiz_'+quizId, progress);
    showQuizResult(quiz, progress, quizId);
  }else if(progress.completed){
    showQuizResult(quiz, progress, quizId);
  }
}

function answerQuestion(quiz, progress, quizId, qi, answer, optEl, card){
  if(progress.answers[qi] !== null) return; // 已答过
  
  progress.answers[qi] = answer;
  Store.set('quiz_'+quizId, progress);
  
  var q = quiz.questions[qi];
  var isCorrect = answer === q.correct;
  
  // 标记选项
  var opts = card.querySelectorAll('.quiz-opt');
  opts.forEach(function(opt, oi){
    opt.classList.add('disabled');
    if(oi === q.correct) opt.classList.add('correct');
    if(oi === answer && !isCorrect) opt.classList.add('wrong');
  });
  
  // 显示反馈
  var fb = el('div', {
    class: 'quiz-feedback show ' + (isCorrect ? 'correct' : 'wrong'),
    html: '<span class="fb-icon">'+(isCorrect?'✅':'❌')+'</span> <strong>'+(isCorrect?'回答正确！':'回答错误。正确答案：'+['A','B','C','D'][q.correct])+'</strong><br>'+q.explain
  });
  card.appendChild(fb);
  
  // 下一题按钮
  var total = quiz.questions.length;
  if(qi < total - 1){
    var nextBtn = el('button', {
      class:'quiz-next-btn',
      html:'下一题 →'
    });
    nextBtn.addEventListener('click', function(){
      var next = $('#qcard-'+(qi+1));
      if(next) next.scrollIntoView({behavior:'smooth', block:'center'});
    });
    card.appendChild(nextBtn);
  }
  
  // 更新进度
  updateQuizProgress(quiz, progress);
  
  // 检查完成
  var allAnswered = progress.answers.every(function(a){ return a !== null; });
  if(allAnswered){
    progress.completed = true;
    progress.score = progress.answers.filter(function(a, i){ return a === quiz.questions[i].correct; }).length;
    Store.set('quiz_'+quizId, progress);
    setTimeout(function(){ showQuizResult(quiz, progress, quizId); }, 500);
  }
}

function updateQuizProgress(quiz, progress){
  var total = quiz.questions.length;
  var answered = progress.answers.filter(function(a){ return a !== null; }).length;
  var pct = Math.round(answered / total * 100);
  var bar = $('#qprogress');
  var text = $('#qprogresstext');
  if(bar) bar.style.width = pct + '%';
  if(text) text.textContent = '第 ' + Math.min(answered+1, total) + ' / ' + total + ' 题（已答'+answered+'）';
}

function showQuizResult(quiz, progress, quizId){
  var area = $('#quiz-result-area');
  if(!area) return;
  
  var score = progress.score;
  var total = quiz.questions.length;
  var pct = Math.round(score / total * 100);
  
  var msg = '';
  if(pct >= 90) msg = '🎉 优秀！你对这部分内容掌握得很好。';
  else if(pct >= 70) msg = '👍 不错！还有一些细节可以回顾。';
  else if(pct >= 50) msg = '💪 继续努力！建议重读本章内容。';
  else msg = '📖 别灰心！回头再看看章节内容，重新做一遍。';
  
  area.innerHTML = '<div class="quiz-result">' +
    '<div style="font-size:.9em;color:var(--muted);margin-bottom:8px">测试完成！</div>' +
    '<div class="quiz-result-score">'+score+'</div>' +
    '<div class="quiz-result-total">/ '+total+' 题（'+pct+'%）</div>' +
    '<div class="quiz-result-msg">'+msg+'</div>' +
    '<button class="quiz-restart-btn" onclick="restartQuiz(\''+quizId+'\')">🔄 重做本测试</button>' +
  '</div>';
  
  area.scrollIntoView({behavior:'smooth', block:'center'});
}

function restartQuiz(quizId){
  Store.set('quiz_'+quizId, {
    answers: APP_DATA.quizzes.find(function(q){ return q.id === quizId; }).questions.map(function(){ return null; }),
    completed: false,
    score: 0
  });
  renderQuiz(quizId);
}

}

  setFontSize(fontSize);
  
  // 恢复主题
  var theme = Store.get('theme', null);
  if(theme){
    document.documentElement.setAttribute('data-theme', theme);
  }
  var themeBtn = $('#theme-btn');
  if(themeBtn) themeBtn.textContent = (theme === 'dark') ? '☀️' : '🌙';
  
  // 路由
  window.addEventListener('hashchange', handleRoute);
  
  // 如果没有hash，默认首页
  if(!location.hash){
    location.hash = '/home';
  }else{
    handleRoute();
  }
  
  // 点击其他区域关闭字体弹窗
  document.addEventListener('click', function(e){
    var popup = $('#font-popup');
    var fontBtn = $('#font-btn');
    if(popup && popup.classList.contains('show') && !popup.contains(e.target) && e.target !== fontBtn){
      popup.classList.remove('show');
    }
  });
}

// 启动
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
}else{
  init();
}

</script>
</body>
</html>
